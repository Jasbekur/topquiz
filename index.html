<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopQuiz</title>
<meta name="theme-color" content="#7C5CFF">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700,900&f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.9.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070710;--bg2:#0D0E1A;--bg3:#13141F;
  --card:#0D0E1A;--card2:#15172380;--border:#222539;
  --accent:#7C5CFF;--al:#9D86FF;--ad:#6442E0;
  --text:#F8FAFC;--t2:#A6B2C8;--t3:#7585A0;
  --ok:#22C55E;--err:#F43F5E;--warn:#FBBF24;
  --glow:rgba(124,92,255,0.25);
  --gold:#F59E0B;--gold2:#EF4444;
}
/* Light mode — applied to <html> so :root variables propagate everywhere */
html.light{
  --bg:#F4F5FB;--bg2:#ECEEF6;--bg3:#E3E6F1;
  --card:#FFFFFF;--card2:#F2F4FA;--border:#DADEEC;
  --text:#0D0E1A;--t2:#475067;--t3:#6B7689;
  --glow:rgba(124,92,255,0.12);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);
  font-family:'Satoshi',system-ui,sans-serif;font-size:16px;line-height:1.65;transition:background .25s,color .25s}
html{height:auto}
body{min-height:100vh}
/* Premium ambient glow behind everything */
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(800px circle at 15% -5%,rgba(124,92,255,.10),transparent 45%),
             radial-gradient(700px circle at 100% 100%,rgba(99,102,241,.07),transparent 50%)}
html.light body::before{background:radial-gradient(800px circle at 15% -5%,rgba(124,92,255,.06),transparent 45%),
             radial-gradient(700px circle at 100% 100%,rgba(99,102,241,.04),transparent 50%)}

/* ── Theme toggle pill ────────────────────────────────────────────────── */
.theme-pill{position:relative;display:inline-flex;align-items:center;justify-content:space-between;
  width:60px;height:30px;background:var(--bg3);border:1.5px solid var(--border);border-radius:999px;
  cursor:pointer;padding:0 6px;transition:background .22s,border-color .22s;flex-shrink:0;
  vertical-align:middle;box-shadow:0 1px 3px rgba(0,0,0,.08) inset}
.theme-pill:hover{border-color:var(--accent)}
.theme-pill-knob{position:absolute;top:50%;left:2px;width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--al),var(--ad));color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:.82rem;
  box-shadow:0 2px 8px rgba(124,92,255,.4);
  transition:transform .28s cubic-bezier(.22,.68,0,1.2),background .22s;
  transform:translateY(-50%)}
.theme-pill.is-light .theme-pill-knob{transform:translate(30px,-50%);
  background:linear-gradient(135deg,#FBBF24,#F59E0B);box-shadow:0 2px 8px rgba(251,191,36,.45)}
.theme-pill-ico-l,.theme-pill-ico-r{font-size:.72rem;color:var(--t3);opacity:.55;pointer-events:none;line-height:1}
.theme-pill.is-dark .theme-pill-ico-l{opacity:0}
.theme-pill.is-light .theme-pill-ico-r{opacity:0}
@media(max-width:400px){
  .theme-pill{width:50px;height:26px;padding:0 5px}
  .theme-pill-knob{width:20px;height:20px;font-size:.72rem}
  .theme-pill.is-light .theme-pill-knob{transform:translate(24px,-50%)}
}
#app{min-height:100vh;display:flex;flex-direction:column}
.clash{font-family:'Clash Display',system-ui,sans-serif}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(.97)}60%{transform:scale(1.02)}100%{transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px var(--glow)}50%{box-shadow:0 0 36px rgba(124,92,255,.28)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}
@keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(110vh) rotate(720deg) scale(.5)}}
@keyframes timerUrgent{0%,100%{box-shadow:0 0 0 0 rgba(255,90,122,0)}50%{box-shadow:0 0 16px 6px rgba(255,90,122,0.38)}}
@keyframes streakPop{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes milestoneFlash{0%,100%{opacity:1}40%{opacity:.5}}
/* ── MOTION & MICRO-INTERACTIONS ── */
@keyframes shake{0%,100%{transform:translateX(0)}18%{transform:translateX(-9px)}36%{transform:translateX(9px)}54%{transform:translateX(-6px)}72%{transform:translateX(6px)}90%{transform:translateX(-3px)}}
@keyframes correctPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.7)}70%{box-shadow:0 0 0 22px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
@keyframes swipeRight{to{transform:translateX(140%) rotate(18deg);opacity:0}}
@keyframes swipeLeft{to{transform:translateX(-140%) rotate(-18deg);opacity:0}}
@keyframes floatCard{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-18px) rotate(-1.5deg)}}
@keyframes rippleAnim{to{transform:scale(5);opacity:0}}
@keyframes blurIn{from{filter:blur(12px);opacity:0}to{filter:blur(0);opacity:1}}
@keyframes knowGlow{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}100%{box-shadow:0 0 32px 8px rgba(34,197,94,0)}}
@keyframes learnGlow{0%{box-shadow:0 0 0 0 rgba(244,63,94,.5)}100%{box-shadow:0 0 32px 8px rgba(244,63,94,0)}}
@keyframes countUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake .42s ease}
.correct-pulse{animation:correctPulse .65s ease}
/* Ripple */
.btn{position:relative;overflow:hidden}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.28);transform:scale(0);
  animation:rippleAnim .55s linear;pointer-events:none}
/* FC spring flip */
.fc-inner{transition:transform .52s cubic-bezier(0.34,1.38,0.64,1)!important}
.page{animation:fadeUp .32s cubic-bezier(.22,.68,0,1.2)}
.slide-right{animation:slideInRight .25s cubic-bezier(.22,.68,0,1.2)}
.slide-left{animation:slideInLeft .25s cubic-bezier(.22,.68,0,1.2)}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;
  background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-brand{font-family:'Clash Display',sans-serif;font-size:1.25rem;font-weight:700;
  color:var(--text);cursor:pointer;letter-spacing:-.02em;display:flex;align-items:center;gap:6px}
.nav-brand::before{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);
  display:inline-block;flex-shrink:0}
.nav-right{display:flex;gap:10px;align-items:center}
.nav-user{width:32px;height:32px;border-radius:50%;background:rgba(124,92,255,.2);
  border:1.5px solid rgba(124,92,255,.4);display:flex;align-items:center;justify-content:center;
  font-size:.82rem;font-weight:800;color:var(--al)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  padding:10px 20px;border-radius:12px;font-family:'Satoshi',sans-serif;
  font-size:.875rem;font-weight:600;border:none;cursor:pointer;
  transition:all .22s cubic-bezier(.22,.68,0,1.2);text-decoration:none;white-space:nowrap;letter-spacing:.01em}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-primary{background:linear-gradient(135deg,var(--al),var(--ad));color:#fff;
  box-shadow:0 4px 16px rgba(124,92,255,.35),0 1px 0 rgba(255,255,255,.12) inset}
.btn-primary:hover{background:linear-gradient(135deg,#AC97FF,var(--accent));
  box-shadow:0 6px 22px rgba(124,92,255,.5),0 1px 0 rgba(255,255,255,.18) inset;transform:translateY(-1px)}
.btn-primary:active{transform:translateY(1px);box-shadow:0 2px 8px rgba(124,92,255,.3)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border);border-color:#2d3f5a;transform:translateY(-1px)}
.btn-danger{background:rgba(255,90,122,.1);color:var(--err);border:1px solid rgba(255,90,122,.25)}
.btn-danger:hover{background:rgba(255,90,122,.18)}
.btn-ghost{background:transparent;color:var(--t2)}
.btn-ghost:hover{background:var(--card2);color:var(--text)}
.btn-sm{padding:6px 14px;font-size:.8rem;border-radius:9px}
.btn-lg{padding:13px 28px;font-size:1rem;border-radius:14px}
.btn-full{width:100%}

/* INPUTS */
.fg{margin-bottom:20px}
.fl{display:block;font-size:.82rem;font-weight:600;color:var(--t3);margin-bottom:8px;
  text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:12px 16px;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;color:var(--text);font-family:'Satoshi',sans-serif;font-size:.95rem;
  outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,92,255,.12)}
.fi::placeholder{color:var(--t3)}
.ig{display:flex;gap:8px}
.ig .fi{flex:1;text-transform:uppercase;letter-spacing:3px;font-size:1rem;font-weight:700}
select.fi{cursor:pointer}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:28px;background:var(--bg)}
.auth-box{width:100%;max-width:440px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo h1{font-family:'Clash Display',sans-serif;font-size:2.2rem;font-weight:700;letter-spacing:-.03em;
  color:var(--text)}
.auth-logo p{color:var(--t3);font-size:.9rem;margin-top:6px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:32px;
  box-shadow:0 24px 48px rgba(0,0,0,.35);border-top:2px solid var(--accent)}
.auth-card h2{font-family:'Clash Display',sans-serif;font-size:1.4rem;font-weight:600;margin-bottom:6px;letter-spacing:-.02em}
.auth-card .sub{color:var(--t3);font-size:.875rem;margin-bottom:24px}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--t3);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-foot{text-align:center;margin-top:20px;color:var(--t3);font-size:.875rem}
.auth-foot a{color:var(--al);text-decoration:none;font-weight:600;cursor:pointer}
.auth-foot a:hover{text-decoration:underline}

/* DASHBOARD */
.main{max-width:1120px;margin:0 auto;padding:40px 28px}
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.pg-title{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;letter-spacing:-.03em}
.pg-sub{color:var(--t2);font-size:.9rem;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.tcard{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:24px;display:flex;flex-direction:column;gap:16px;
  transition:border-color .22s,transform .22s,box-shadow .22s;cursor:default}
.tcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.tcard-top{display:flex;align-items:flex-start;gap:14px}
.tcard-icon{width:48px;height:48px;background:rgba(124,92,255,.15);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;
  border:1px solid rgba(124,92,255,.2)}
.tcard-name{font-family:'Clash Display',sans-serif;font-size:1.05rem;font-weight:700;line-height:1.3;letter-spacing:-.02em}
.tcard-meta{color:var(--t3);font-size:.8rem;margin-top:3px;font-weight:500}
.share-id{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);
  border:1px solid var(--border);border-radius:10px;padding:5px 12px;
  font-size:.78rem;font-family:monospace;letter-spacing:1.5px;color:var(--al);
  cursor:pointer;transition:all .2s;user-select:none;font-weight:600}
.share-id:hover{background:rgba(124,92,255,.12);border-color:rgba(124,92,255,.3)}
.tcard-acts{display:flex;gap:8px;flex-wrap:wrap}
.empty{text-align:center;padding:90px 24px;color:var(--t3)}
.empty-ico{font-size:4rem;margin-bottom:16px;opacity:.4}
.empty h3{font-family:'Clash Display',sans-serif;font-size:1.3rem;color:var(--t2);margin-bottom:8px}

/* UPLOAD */
.upload-wrap{max-width:820px;margin:0 auto;padding:36px 28px}
.back-row{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.back-btn{width:38px;height:38px;background:var(--card);border:1.5px solid var(--border);
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);transition:all .2s;font-size:1.1rem}
.back-btn:hover{background:var(--card2);color:var(--text);border-color:var(--accent)}
.dropzone{border:2px dashed var(--border);border-radius:20px;padding:60px 32px;
  text-align:center;cursor:pointer;transition:all .25s;background:var(--card)}
.dropzone:hover,.dropzone.over{border-color:var(--accent);background:rgba(124,92,255,.05);
  box-shadow:0 0 40px var(--glow)}
.dz-ico{font-size:3rem;margin-bottom:16px;opacity:.6}
.dz-title{font-size:1.1rem;font-weight:700;margin-bottom:6px}
.dz-sub{color:var(--t3);font-size:.875rem}
.fmt-box{margin-top:16px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:18px}
.fmt-label{font-size:.78rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.fmt-pre{font-size:.8rem;color:var(--t2);line-height:2;font-family:monospace}
.preview-sec{margin-top:32px}
.preview-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.preview-title{font-size:1.1rem;font-weight:700;letter-spacing:-.01em}
.qprev{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px}
.qprev-n{font-size:.78rem;color:var(--al);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.qprev-t{font-weight:600;margin-bottom:12px;line-height:1.5}
.opt-prev{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:.875rem;font-weight:500}
.opt-prev.c{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--ok)}
.opt-prev.w{background:var(--bg3);border:1px solid var(--border);color:var(--t2)}

/* SAVE BAR + COUNT CHIPS */
.save-bar{display:flex;align-items:flex-end;gap:14px;background:var(--card);
  border:1.5px solid var(--accent);border-radius:18px;padding:20px;margin-bottom:22px;
  flex-wrap:wrap;box-shadow:0 0 32px var(--glow);
  position:sticky;top:65px;z-index:10}
.save-bar .fg{margin:0;flex:1;min-width:200px}
.count-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.chip{padding:6px 16px;border-radius:999px;border:1.5px solid var(--border);
  background:var(--bg3);color:var(--t2);font-family:'Satoshi',sans-serif;
  font-size:.82rem;font-weight:600;cursor:pointer;transition:all .18s}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.on{border-color:var(--accent);background:rgba(124,92,255,.18);color:var(--al)}

/* MANUAL BUILDER */
.builder-toggle{background:var(--card2);border:1.5px dashed var(--border);border-radius:16px;
  padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .2s;margin-top:16px;font-weight:600;color:var(--t2)}
.builder-toggle:hover{border-color:var(--accent);color:var(--text);background:rgba(124,92,255,.06)}
.builder-section{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:24px;margin-top:12px}
.builder-opt-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.builder-opt-row input[type=radio]{accent-color:var(--accent);width:18px;height:18px;
  flex-shrink:0;cursor:pointer}
.builder-opt-row .fi{flex:1}

/* PICKER */
.picker-wrap{max-width:540px;margin:56px auto;padding:0 24px}
.picker-card{background:var(--card);border:1.5px solid var(--border);border-radius:28px;padding:40px;text-align:center;
  box-shadow:0 0 60px rgba(0,0,0,.4),0 0 0 1px rgba(255,255,255,.03)}
.picker-title{font-family:'Clash Display',sans-serif;font-size:1.6rem;font-weight:700;margin-bottom:8px;letter-spacing:-.03em}
.picker-sub{color:var(--t3);font-size:.9rem;margin-bottom:28px;font-weight:500}

/* SECTION BADGE */
.section-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;
  background:rgba(124,92,255,.1);border:1px solid rgba(124,92,255,.25);
  border-radius:999px;font-size:.78rem;font-weight:700;color:var(--al);
  margin-bottom:12px;letter-spacing:.02em;text-transform:uppercase}

/* SESSION LIST */
.session-row{display:flex;align-items:center;gap:14px;width:100%;padding:14px 18px;
  background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;
  cursor:pointer;transition:all .2s cubic-bezier(.22,.68,0,1.2);text-align:left;
  font-family:'Satoshi',sans-serif;color:var(--text)}
.session-row:hover{border-color:var(--accent);background:rgba(124,92,255,.08);transform:translateX(4px)}
.session-lbl{font-size:.78rem;font-weight:700;color:var(--al);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:2px}
.session-range{font-size:.95rem;font-weight:600}
.session-cnt{font-size:.78rem;font-weight:700;color:var(--t3);
  padding:3px 10px;background:var(--bg);border:1px solid var(--border);border-radius:999px;white-space:nowrap}
.session-arr{color:var(--accent);font-size:1rem;font-weight:700}
.sessions-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px;
  max-height:58vh;overflow-y:auto;padding-right:2px}
.sessions-list::-webkit-scrollbar{width:4px}
.sessions-list::-webkit-scrollbar-track{background:var(--bg3);border-radius:4px}
.sessions-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.session-score{font-size:.78rem;font-weight:700;padding:2px 9px;border-radius:999px;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--ok);white-space:nowrap}
.session-score.low{background:rgba(255,90,122,.08);border-color:rgba(255,90,122,.25);color:var(--err)}
.session-score.mid{background:rgba(251,191,36,.08);border-color:rgba(251,191,36,.25);color:var(--warn)}

/* QUIZ */
.quiz-wrap{max-width:720px;margin:0 auto;padding:32px 28px;min-height:calc(100vh - 64px);display:flex;flex-direction:column}
.quiz-hd{margin-bottom:28px}
.quiz-name{font-size:1rem;font-weight:600;color:var(--t2);margin-bottom:14px}
.prog-bar{height:7px;background:var(--bg3);border-radius:999px;overflow:hidden;margin-bottom:8px;
  border:1px solid var(--border)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--al));
  border-radius:999px;transition:width .35s cubic-bezier(.22,.68,0,1.2)}
.prog-lbl{display:flex;justify-content:space-between;font-size:.8rem;color:var(--t3);font-weight:500}

/* TIMER */
.timer-bar-wrap{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden;margin-bottom:4px;
  transition:box-shadow .3s}
.timer-bar-wrap.urgent{animation:timerUrgent .55s ease-in-out infinite;overflow:visible}
.timer-fill{height:100%;border-radius:999px;background:var(--ok);transition:width 1s linear}
.timer-fill.mid{background:var(--warn)}
.timer-fill.low{background:var(--err)}
.timer-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--t3);
  font-weight:600;margin-bottom:14px}
.timer-row.urgent-lbl{color:var(--err)}

.qcard{background:var(--card);border:1.5px solid var(--border);border-radius:24px;padding:32px;flex:1;
  box-shadow:0 0 0 1px rgba(255,255,255,.02),0 20px 60px rgba(0,0,0,.3)}
.q-num{font-size:.78rem;color:var(--al);font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:16px}
.q-text{font-family:'Satoshi',sans-serif;font-size:1.4rem;font-weight:700;
  line-height:1.55;margin-bottom:28px;letter-spacing:-.01em}
.opts{display:flex;flex-direction:column;gap:11px}

.opt{display:flex;align-items:center;gap:14px;padding:16px 20px;min-height:52px;
  background:var(--bg3);border:1.5px solid var(--border);border-radius:14px;
  cursor:pointer;transition:all .2s cubic-bezier(.22,.68,0,1.2);user-select:none}
.opt:hover{border-color:var(--accent);background:rgba(124,92,255,.08);
  transform:translateX(3px);box-shadow:0 0 20px var(--glow)}
.opt.sel{border-color:var(--accent);background:rgba(124,92,255,.12);
  box-shadow:0 0 24px var(--glow)}
.opt-mark{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.78rem;
  font-weight:800;flex-shrink:0;transition:all .2s;color:var(--t3)}
.opt.sel .opt-mark{background:var(--accent);border-color:var(--accent);color:#fff;
  box-shadow:0 0 12px rgba(124,92,255,.5)}
.opt-txt{font-size:1rem;font-weight:500;flex:1;line-height:1.4}

.opt.locked{pointer-events:none;cursor:default}
.opt.ans-correct{border-color:var(--ok)!important;
  background:rgba(34,197,94,.1)!important;animation:popIn .25s ease;
  box-shadow:0 0 20px rgba(34,197,94,.2)!important}
.opt.ans-correct .opt-mark{background:var(--ok)!important;border-color:var(--ok)!important;color:#fff!important}
.opt.ans-wrong{border-color:var(--err)!important;
  background:rgba(255,90,122,.08)!important;animation:popIn .25s ease;
  box-shadow:0 0 20px rgba(255,90,122,.15)!important}
.opt.ans-wrong .opt-mark{background:var(--err)!important;border-color:var(--err)!important;color:#fff!important}
.opt.ans-reveal{border-color:rgba(34,197,94,.5)!important;background:rgba(34,197,94,.06)!important}
.opt.ans-reveal .opt-mark{border-color:var(--ok)!important;color:var(--ok)!important}

.feedback-badge{display:inline-flex;align-items:center;gap:7px;margin-top:16px;
  padding:9px 16px;border-radius:12px;font-size:.875rem;font-weight:600}
.feedback-badge.ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.feedback-badge.err{background:rgba(255,90,122,.1);color:var(--err);border:1px solid rgba(255,90,122,.25)}

.expl-box{margin-top:12px;padding:14px 18px;background:rgba(124,92,255,.08);
  border:1px solid rgba(124,92,255,.25);border-radius:14px;font-size:.875rem;
  color:var(--t2);line-height:1.65}
.expl-lbl{font-size:.78rem;font-weight:800;color:var(--al);text-transform:uppercase;
  letter-spacing:.07em;margin-bottom:5px}

.quiz-nav{display:flex;justify-content:space-between;align-items:center;margin-top:28px;flex-wrap:wrap;gap:12px}
.quiz-nav-mid{color:var(--t3);font-size:.82rem;font-weight:600}

/* RESULTS */
.res-wrap{max-width:720px;margin:0 auto;padding:40px 28px}
.res-hd{text-align:center;margin-bottom:40px}
.res-hd h1{font-family:'Clash Display',sans-serif;font-size:2.2rem;font-weight:700;
  margin-bottom:8px;letter-spacing:-.03em}
.res-hd p{color:var(--t3);font-weight:500}
.ring-wrap{display:flex;justify-content:center;margin-bottom:40px;position:relative}
.ring-svg{transform:rotate(-90deg);filter:drop-shadow(0 0 20px var(--glow))}
.ring-txt{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ring-pct{font-family:'Clash Display',sans-serif;font-size:4rem;font-weight:700;letter-spacing:-.04em}
.ring-lbl{font-size:.85rem;color:var(--t3);font-weight:500}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:40px}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:18px;
  padding:22px 16px;text-align:center}
.stat-val{font-family:'Clash Display',sans-serif;font-size:2rem;font-weight:700;margin-bottom:4px;letter-spacing:-.03em}
.stat-val.ok{color:var(--ok)}.stat-val.err{color:var(--err)}.stat-val.warn{color:var(--warn)}
.stat-lbl{font-size:.78rem;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.bkd-title{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:600;
  margin-bottom:16px;letter-spacing:-.01em}
.bkd-item{background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:16px 20px;margin-bottom:10px;transition:border-color .2s}
.bkd-item.ok-item{border-left:3px solid var(--ok)}
.bkd-item.err-item{border-left:3px solid var(--err)}
.bkd-q{font-weight:600;margin-bottom:7px;font-size:.92rem;line-height:1.45}
.bkd-ans{font-size:.82rem;color:var(--t3);font-weight:500}
.bkd-ans .ok-t{color:var(--ok);font-weight:700}
.bkd-ans .err-t{color:var(--err);font-weight:700}
.res-btns{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px}

/* GUEST CTA */
.guest-cta{background:linear-gradient(135deg,rgba(124,92,255,.15),rgba(124,92,255,.04));
  border:1.5px solid rgba(124,92,255,.3);border-radius:20px;padding:28px;text-align:center;
  margin-bottom:28px}
.guest-cta h3{font-family:'Clash Display',sans-serif;font-size:1.3rem;font-weight:700;
  margin-bottom:8px;letter-spacing:-.02em}
.guest-cta p{color:var(--t3);font-size:.875rem;margin-bottom:18px;line-height:1.55}

/* BROWSE */
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.browse-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;
  padding:22px;transition:border-color .22s,transform .22s,box-shadow .22s;cursor:pointer}
.browse-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.browse-card-ico{font-size:1.8rem;margin-bottom:10px}
.browse-card-title{font-weight:700;font-size:1rem;margin-bottom:4px;letter-spacing:-.01em;line-height:1.3}
.browse-card-meta{color:var(--t3);font-size:.82rem;font-weight:500;margin-bottom:12px}

/* CONFETTI */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:99999;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;border-radius:3px;
  animation:confettiFall linear forwards}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--card2);
  border:1px solid var(--border);border-radius:14px;padding:14px 20px;
  font-size:.875rem;font-weight:500;
  box-shadow:0 16px 48px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04);
  z-index:999;animation:fadeUp .3s ease;max-width:320px}
.toast.ok-t{border-left:3px solid var(--ok)}
.toast.err-t{border-left:3px solid var(--err)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:24px;
  padding:32px;max-width:430px;width:100%;animation:fadeUp .25s ease;
  box-shadow:0 0 60px rgba(0,0,0,.5)}
.modal-title{font-family:'Clash Display',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:8px;letter-spacing:-.02em}
.modal-body{color:var(--t2);font-size:.9rem;margin-bottom:24px;line-height:1.6}
.modal-foot{display:flex;gap:10px;justify-content:flex-end}

/* NEEDS REVIEW */
.qprev.needs-review{border-color:rgba(251,191,36,.45)}
.review-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
  border-radius:999px;font-size:.78rem;font-weight:700;color:var(--warn);
  margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.review-hint{font-size:.78rem;color:var(--t3);margin-bottom:10px;font-weight:500}
.opt-prev.pick{cursor:pointer;transition:background .15s,border-color .15s}
.opt-prev.pick:hover{background:rgba(124,92,255,.1);border-color:var(--accent);color:var(--text)}

/* INLINE EDIT */
.edit-icon-btn{background:none;border:none;cursor:pointer;font-size:.78rem;
  padding:3px 7px;border-radius:7px;color:var(--t3);transition:all .15s;
  vertical-align:middle;line-height:1;flex-shrink:0}
.edit-icon-btn:hover{background:var(--bg3);color:var(--text)}
.edit-icon-btn.del:hover{color:var(--err);background:rgba(255,90,122,.08)}
.qprev-n-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.qprev-n-row .qprev-n{margin-bottom:0}
.opt-prev{display:flex;align-items:center;gap:8px}
.opt-text-span{flex:1}
.add-opt-wrap{margin-top:8px}
.inline-input-row{display:flex;gap:8px;align-items:center;margin-top:6px}

/* MISC */
.err-msg{background:rgba(255,90,122,.08);border:1px solid rgba(255,90,122,.25);
  border-radius:12px;padding:12px 16px;color:var(--err);font-size:.875rem;
  margin-bottom:16px;font-weight:500}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .75s linear infinite}
/* INSERT QUESTION DIVIDER */
.insert-q-divider{display:flex;align-items:center;gap:10px;margin:2px 0;
  opacity:0;transition:opacity .18s}
.insert-q-divider:hover{opacity:1}
.insert-q-divider::before,.insert-q-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.insert-q-divider button{display:flex;align-items:center;gap:5px;padding:4px 12px;
  border-radius:999px;border:1.5px dashed var(--accent);background:rgba(124,92,255,.08);
  color:var(--al);font-family:'Satoshi',sans-serif;font-size:.75rem;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:all .15s}
.insert-q-divider button:hover{background:rgba(124,92,255,.18)}

.public-badge{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;
  background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);
  border-radius:999px;font-size:.7rem;font-weight:700;color:var(--ok)}

/* (grain removed — clean dark theme needs no texture overlay) */

/* STREAK BADGE */
.streak-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(251,191,36,.05));
  border:1.5px solid rgba(251,191,36,.35);border-radius:999px;
  font-size:.82rem;font-weight:800;color:var(--warn);margin-bottom:10px;
  animation:streakPop .35s cubic-bezier(.22,.68,0,1.2);letter-spacing:.01em}

/* SCORE ANCHOR ON DASHBOARD */
.score-anchor{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;
  background:rgba(124,92,255,.1);border:1px solid rgba(124,92,255,.25);
  border-radius:999px;font-size:.75rem;font-weight:700;color:var(--al)}
.score-anchor.beat{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--ok)}

/* REVIEW DUE BADGE */
.review-due{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
  border-radius:999px;font-size:.75rem;font-weight:700;color:var(--warn)}

/* RESULTS EMOTION */
.res-emoji{font-size:4.5rem;line-height:1;margin-bottom:14px;
  animation:popIn .4s cubic-bezier(.22,.68,0,1.2)}

/* (TIB removed) */

/* ── AI GENERATOR ────────────────────────────────────────────────────────── */
.ai-section{background:linear-gradient(135deg,rgba(245,158,11,.1),rgba(239,68,68,.06));
  border:1.5px solid rgba(124,92,255,.3);border-radius:20px;padding:24px;margin-top:16px}
.ai-section-title{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;
  margin-bottom:4px;letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.ai-section-sub{color:var(--t3);font-size:.85rem;margin-bottom:18px}
.ai-key-row{display:flex;gap:8px;margin-bottom:14px}
.ai-spinner{display:inline-flex;align-items:center;gap:8px;color:var(--al);font-size:.875rem;font-weight:600}

/* ── MASTERY MAP ─────────────────────────────────────────────────────────── */
.mastery-section{margin-top:36px}
.mastery-title{font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;
  letter-spacing:-.01em;margin-bottom:4px}
.mastery-sub{font-size:.82rem;color:var(--t3);margin-bottom:0}
.mastery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;margin-top:16px}
.mastery-card{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:16px}
.mastery-card.ok-topic{border-left:3px solid var(--ok)}
.mastery-card.mid-topic{border-left:3px solid var(--warn)}
.mastery-card.low-topic{border-left:3px solid var(--err)}
.mastery-topic{font-weight:700;font-size:.9rem;margin-bottom:8px;line-height:1.3}
.mastery-bar-bg{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden;margin-bottom:6px}
.mastery-bar-fill{height:100%;border-radius:999px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.mastery-dots{display:flex;gap:3px;flex-wrap:wrap}
.mastery-dot{width:10px;height:10px;border-radius:50%}
.mastery-dot.ok{background:var(--ok)}.mastery-dot.err{background:var(--err)}.mastery-dot.skip{background:var(--border)}

/* ── 1v1 CHALLENGE ───────────────────────────────────────────────────────── */
.challenge-vs{display:flex;align-items:center;justify-content:center;gap:24px;margin:28px 0}
.challenge-side{text-align:center;flex:1}
.challenge-avatar{font-size:3rem;margin-bottom:6px}
.challenge-name{font-weight:700;font-size:1rem;margin-bottom:4px}
.challenge-score-big{font-family:'Clash Display',sans-serif;font-size:2.4rem;font-weight:700;letter-spacing:-.03em}
.challenge-vs-divider{font-family:'Clash Display',sans-serif;font-size:1.8rem;font-weight:700;
  color:var(--t3);flex-shrink:0}
.challenge-q-compare{display:flex;gap:8px;margin-bottom:6px;align-items:center}
.cq-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.cq-text{font-size:.82rem;color:var(--t2);flex:1;line-height:1.4}
.challenge-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:999px;font-size:.82rem;font-weight:700}
.challenge-badge.win{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:var(--ok)}
.challenge-badge.loss{background:rgba(255,90,122,.08);border:1px solid rgba(255,90,122,.25);color:var(--err)}
.challenge-badge.draw{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.25);color:var(--warn)}
.challenge-link-box{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 16px;font-size:.82rem;color:var(--al);cursor:pointer;transition:all .2s;
  word-break:break-all;display:flex;flex-direction:column;gap:8px;margin-top:12px}
.challenge-link-box:hover{background:rgba(124,92,255,.1);border-color:rgba(124,92,255,.35)}

/* ── GAME / KAHOOT MODE ──────────────────────────────────────────────────── */
.game-pin-display{font-family:'Clash Display',sans-serif;font-size:3.8rem;font-weight:700;
  letter-spacing:.18em;color:var(--text);background:var(--card);
  border:2.5px solid var(--accent);border-radius:24px;padding:20px 40px;
  text-align:center;margin:20px 0;box-shadow:0 0 48px var(--glow);line-height:1}
.player-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;
  background:var(--card2);border:1.5px solid var(--border);border-radius:999px;
  font-size:.9rem;font-weight:600;animation:popIn .3s cubic-bezier(.22,.68,0,1.2)}
.game-opts{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.game-opt{display:flex;align-items:center;gap:12px;padding:18px 16px;
  border-radius:16px;border:none;cursor:pointer;
  font-family:'Satoshi',sans-serif;font-size:1rem;font-weight:700;color:#fff;
  transition:transform .15s,opacity .15s,box-shadow .15s;text-align:left;
  min-height:72px;width:100%;box-shadow:0 4px 0 rgba(0,0,0,.25)}
.game-opt:hover{transform:translateY(-2px);box-shadow:0 6px 0 rgba(0,0,0,.25)}
.game-opt:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.25)}
.game-opt:disabled,.game-opt.answered{opacity:.45;cursor:not-allowed;pointer-events:none;transform:none}
.game-opt.correct{outline:4px solid rgba(255,255,255,.85);transform:translateY(-2px)}
.game-opt.wrong{opacity:.28;transform:none}
.game-opt.go-a{background:linear-gradient(135deg,#4257b2,#3448a0)}
.game-opt.go-b{background:linear-gradient(135deg,#e21b3c,#c41534)}
.game-opt.go-c{background:linear-gradient(135deg,#26890c,#1e6e09)}
.game-opt.go-d{background:linear-gradient(135deg,#e8a000,#c88800)}
.game-opt-letter{width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.22);display:flex;align-items:center;
  justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0}
/* Leaderboard rows */
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;
  background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  margin-bottom:8px;animation:fadeUp .2s ease}
.lb-rank{font-size:1.2rem;width:32px;text-align:center;flex-shrink:0}
.lb-avatar{font-size:1.3rem;flex-shrink:0}
.lb-name{flex:1;font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{font-family:'Clash Display',sans-serif;font-size:1.15rem;font-weight:700;color:var(--accent);white-space:nowrap}
.lb-delta{font-size:.75rem;font-weight:700;color:var(--ok);white-space:nowrap}
/* Podium */
.podium-wrap{display:flex;justify-content:center;align-items:flex-end;gap:10px;margin:28px 0}
.podium-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.podium-avatar-lbl{font-size:2rem}
.podium-name{font-weight:700;font-size:.85rem;text-align:center;max-width:80px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.podium-pts{font-size:.75rem;color:var(--t3);font-weight:600}
.podium-block{border-radius:12px 12px 0 0;width:82px;display:flex;
  align-items:center;justify-content:center;font-size:1.6rem}
.podium-gold{background:linear-gradient(180deg,#fbbf24,#f59e0b);height:100px}
.podium-silver{background:linear-gradient(180deg,#94a3b8,#64748b);height:72px}
.podium-bronze{background:linear-gradient(180deg,#cd7c3e,#a05c2a);height:52px}
/* Answer bar chart */
.ans-bar-wrap{background:rgba(255,255,255,.18);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.ans-bar-fill{background:#fff;height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1)}
/* Waiting state */
.waiting-pulse{animation:glowPulse 2s ease-in-out infinite}
/* Join big PIN input */
.join-pin-input{font-size:2.2rem!important;font-weight:800!important;
  letter-spacing:.25em!important;text-align:center!important;
  font-family:'Clash Display',sans-serif!important;padding:18px!important}

/* SEARCH BAR */
.dash-search-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.dash-search{flex:1;min-width:200px;background:var(--bg3);border:1.5px solid var(--border);
  border-radius:12px;padding:10px 16px;color:var(--text);font-family:'Satoshi',sans-serif;
  font-size:.9rem;outline:none;transition:border-color .2s}
.dash-search:focus{border-color:var(--accent)}
.dash-search::placeholder{color:var(--t3)}

/* TAG CHIPS (on cards) */
.tag-chip{display:inline-flex;align-items:center;padding:2px 9px;border-radius:999px;
  background:rgba(124,92,255,.1);border:1px solid rgba(124,92,255,.2);
  font-size:.7rem;font-weight:700;color:var(--al);cursor:pointer;transition:all .15s}
.tag-chip:hover{background:rgba(124,92,255,.22)}
.tag-chip.active{background:rgba(124,92,255,.28);border-color:var(--accent)}

/* DAILY STREAK BANNER */
.streak-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(251,191,36,.04));
  border:1.5px solid rgba(251,191,36,.3);border-radius:16px;padding:14px 20px;
  margin-bottom:20px;flex-wrap:wrap}
.streak-banner-val{font-family:'Clash Display',sans-serif;font-size:1.6rem;font-weight:700;
  color:var(--warn);line-height:1}
.streak-banner-lbl{font-size:.82rem;color:var(--t2);font-weight:600}

/* ── STANDALONE FLASHCARDS ───────────────────────────────────────────────── */
.fc-card{perspective:900px;cursor:grab;margin-bottom:24px;touch-action:pan-y;user-select:none;
  transition:transform .18s ease,box-shadow .18s ease}
.fc-card:active{cursor:grabbing}
.fc-card.swipe-right{animation:swipeRight .32s cubic-bezier(.4,0,.2,1) forwards;animation:knowGlow .32s ease}

// ── UTILS ──────────────────────────────────────────────────────────────────
function uid(n=8){
  return Array.from({length:n},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
}
function hashPw(s){
  // djb2 hash — not crypto-safe but not plaintext; prefixed so we can detect hashed vs old plain
  let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return'h:'+h.toString(36);
}
function go(p){location.hash='#'+p}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// Safe version for JS string args inside onclick="fn('...')" — escapes single quotes
function escJs(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function toast(msg,type='ok'){
  const d=document.createElement('div');
  d.className=`toast ${type}-t`;d.textContent=msg;
  document.getElementById('toasts').appendChild(d);
  setTimeout(()=>d.remove(),3200);
}
function copy(txt){navigator.clipboard.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast(txt))}
function shuffle(arr){return[...arr].sort(()=>Math.random()-.5)}

// ── AUTH ───────────────────────────────────────────────────────────────────
function initSession(){const s=DB.session();if(s)S.user=s}
function doLogin(email,pw){
  const users=DB.users();
  // Try hashed first; fall back to plain-text for existing accounts (auto-upgrades on success)
  let u=users.find(u=>u.email===email&&u.password===hashPw(pw));
  if(!u){
    u=users.find(u=>u.email===email&&u.password===pw&&!pw.startsWith('h:'));
    if(u){u.password=hashPw(pw);DB.setUsers(users);} // upgrade to hashed
  }
  if(!u)throw new Error('Invalid email or password');
  S.user=u;DB.setSession(u);return u;
}
function doRegister(name,email,pw){
  const users=DB.users();
  if(users.find(u=>u.email===email))throw new Error('Email already registered');
  const u={id:uid(),name,email,password:hashPw(pw),at:Date.now()};
  users.push(u);DB.setUsers(users);S.user=u;DB.setSession(u);return u;
}
function logout(){S.user=null;DB.clearSession();go('/login')}

// ── PARSE ──────────────────────────────────────────────────────────────────
function stripJunk(s){
  return s.replace(/^[^a-zA-ZÀ-ɏЀ-ӿ0-9]+/, '').trim();
}
function parseOpt(raw){
  const s=raw.trim();
  const firstLetter=s.search(/[a-zA-ZÀ-ɏЀ-ӿ]/);
  const hashPos=s.indexOf('#');
  const correct=hashPos!==-1&&(firstLetter===-1||hashPos<firstLetter);
  return{text:stripJunk(s),correct};
}
function parseDocx(text){
  return text.split('++++').map(b=>b.trim()).filter(Boolean).reduce((acc,block)=>{
    let explanation='';
    let mainBlock=block;
    const explIdx=block.indexOf('^^^^');
    if(explIdx!==-1){
      explanation=block.slice(explIdx+4).trim();
      mainBlock=block.slice(0,explIdx).trim();
    }
    const parts=mainBlock.split('====').map(p=>p.trim()).filter(Boolean);
    if(parts.length<2)return acc;
    const qText=stripJunk(parts[0]);
    const opts=parts.slice(1).map(parseOpt).filter(o=>o.text);
    if(qText&&opts.length>=2)acc.push({id:uid(),text:qText,options:opts,explanation});
    return acc;
  },[]);
}

function detachGameListener(){
  fbOff(S.gameRef);S.gameRef=null;
  clearInterval(S.hostTimerItv);S.hostTimerItv=null;
  clearInterval(S.playerTimerItv);S.playerTimerItv=null;
}
function route(){
  clearTimer();
  // Leave game listener when navigating away from game pages
  const hash=location.hash.replace('#','').replace(/^\//,'/')||'/login';
  const parts=hash.split('/').filter(Boolean);
  const p=parts[0]||'login';
  if(p!=='host-game'&&p!=='play')detachGameListener();

  if(p==='landing'){paint(pgLanding());return}
  if(p==='login'||p==='register'){
    if(S.user){go('/dashboard');return}
    paint(p==='login'?pgLogin():pgRegister());
    return;
  }
  if(p==='join'){frame(pgJoin());return}
  if(p==='flashcards'){
    if(parts[1]){
      S.fcStudyMode=false;S.fcIdx=0;S.fcFlipped=false;
      frame(pgFlashcardDeck(parts[1]));
    }else{
      frame(pgFlashcards());
    }
    return;
  }
  if(p==='challenge'&&parts[1]){frame(pgChallenge(parts[1]));return}
  if(p==='host-game'&&parts[1]){frame(pgHostGame(parts[1]));return}
  if(p==='play'&&parts[1]&&parts[2]){frame(pgPlay(parts[1],parts[2]));return}
  if(p==='test'&&parts[1]){
    // Support both internal id and shareId in URL
    const rawId=parts[1];
    const byShare=DB.tests().find(tt=>tt.shareId===rawId.toUpperCase());
    if(byShare){frame(pgQuiz(byShare.id));return;}
    // If not found locally, try Firebase then render
    if(rawId.length===8&&rawId===rawId.toUpperCase()){
      paint(`<div style="text-align:center;padding:80px 24px;color:var(--t3)">
        <div style="font-size:2.5rem;margin-bottom:14px"><i class="ti ti-loader" style="animation:spin 1s linear infinite"></i></div>
        <p>Loading test…</p></div>`);
      fbGet('tests/'+rawId).then(remote=>{
        if(remote){const ts=DB.tests();if(!ts.find(x=>x.shareId===rawId)){ts.push(remote);DB.setTests(ts);}frame(pgQuiz(remote.id));}
        else frame(pgQuiz(rawId));
      }).catch(()=>frame(pgQuiz(rawId)));
      return;
    }
    frame(pgQuiz(rawId));return;
  }
  if(p==='results'&&parts[1]){frame(pgResults(parts[1]));return}
  if(p==='browse'){frame(pgBrowse());return}
  if(!S.user){go('/landing');return}
  if(p==='dashboard'){frame(pgDashboard());return}
  if(p==='upload'){frame(pgUpload());return}
  if(p==='edit'&&parts[1]){frame(pgEditAnswers(parts[1]));return}
  go('/dashboard');
}

function toggleTheme(){
  const html=document.documentElement;
  const goingLight=!html.classList.contains('light');
  html.classList.toggle('light', goingLight);
  // Mirror on body for any legacy selectors
  document.body.classList.toggle('light', goingLight);
  localStorage.setItem('qh_theme', goingLight?'light':'dark');
  // Update browser status-bar color
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta) meta.setAttribute('content', goingLight?'#F4F5FB':'#070710');
  // Re-render current route so the toggle icon updates
  route();
}
(()=>{
  const saved=localStorage.getItem('qh_theme');
  // Default: respect user's OS preference if no saved choice
  const prefersLight=window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches;
  const useLight=saved?saved==='light':prefersLight;
  if(useLight){
    document.documentElement.classList.add('light');
    document.body&&document.body.classList.add('light');
    const meta=document.querySelector('meta[name="theme-color"]');
    if(meta) meta.setAttribute('content','#F4F5FB');
  }
})();

function buildSparkline(data){
  if(!data||data.length<2)return'';
  const w=120,h=32,pad=4;
  const max=Math.max(...data,1),min=Math.min(...data,0);
  const range=max-min||1;
  const pts=data.map((v,i)=>{
    const x=pad+i*(w-pad*2)/(data.length-1);
    const y=h-pad-(v-min)/range*(h-pad*2);
    return`${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const lastPct=data[data.length-1];
  const clr=lastPct>=70?'#22C55E':lastPct>=50?'#FBBF24':'#F43F5E';
  return`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
    <polyline points="${pts.join(' ')}" fill="none" stroke="${clr}" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round" opacity=".85"/>
    <circle cx="${pts[pts.length-1].split(',')[0]}" cy="${pts[pts.length-1].split(',')[1]}"
      r="3" fill="${clr}"/>
  </svg>`;
}

          onclick="createAndHostGame('${tst.id}')">${t('hostGameBtn')}</button>

      </div>
    </div>`;}).join('')}</div>`
  :`<div class="empty">
    <div class="empty-ico"><i class="ti ti-notes"></i></div>
    <h3>${t('noTestsYet')}</h3>
    <p>${t('noTestsHint')}</p>
    <br><button class="btn btn-primary" onclick="go('/upload')">${t('uploadTest')}</button>
  </div>`;
  return`<div class="main">
    <div class="pg-head">
      <div><div class="pg-title">${t('myTests')}</div>
        <div class="pg-sub">${allTests.length} ${t('testsInLib')}</div>

      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="go('/upload')"><i class="ti ti-plus"></i> ${t('uploadTest')}</button>
      </div>
    </div>
    ${streakData.count>=2?`<div class="streak-banner">
      <div style="font-size:2rem"><i class="ti ti-flame"></i></div>
      <div>
        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="streak-banner-val">${streakData.count}</span>
          <span class="streak-banner-lbl">${t('dayStreak')}</span>
        </div>
        <div style="font-size:.78rem;color:var(--t3);margin-top:2px">${t('streakMsg')}</div>
      </div>
    </div>`:''}
    <div class="dash-search-row">
      <input class="dash-search" placeholder="${t('searchTests')}" value="${esc(S.dashSearch)}"
        oninput="S.dashSearch=this.value;frame(pgDashboard())">
      ${allTags.length?`<div style="display:flex;gap:6px;flex-wrap:wrap">
        ${tf?`<button class="btn btn-ghost btn-sm" style="font-size:.75rem" onclick="S.dashTag='';frame(pgDashboard())"><i class="ti ti-x"></i> ${esc(tf)}</button>`:''}

      </div>`:''}
    </div>
    ${cards}
  </div>`
}

              <span class="opt-text-span">${esc(o.text)}</span>
              <button class="edit-icon-btn" onclick="event.stopPropagation();editParsedOptText(${i},${oi})" title="Edit option"><i class="ti ti-pencil"></i></button>
              <button class="edit-icon-btn del" onclick="event.stopPropagation();deleteParsedOpt(${i},${oi})" title="Delete option"><i class="ti ti-x"></i></button>
            </div>`).join('')}
          </div>
          <div id="padd-opt-${i}" style="margin-top:6px">
            <button class="btn btn-ghost btn-sm" style="font-size:.78rem" onclick="addParsedOption(${i})">${t('addOptionBtn')}</button>
          </div>
          ${q.explanation?`<div style="margin-top:8px;font-size:.78rem;color:var(--t3);font-style:italic"><i class="ti ti-message-circle"></i> ${esc(q.explanation)}</div>`:''}
        </div>
        <div class="insert-q-divider">
          <button onclick="insertParsedQuestion(${i})"><i class="ti ti-plus"></i> ${t('addQHere').replace('+ ','')}</button>
        </div>`;
      }).join('')}
      </div>
    </div>`:''}
  </div>`
}

function pgSessionList(test){
  const customSize=S.customSessionSize&&S.customSessionSize>0?S.customSessionSize:null;
  const sessionSize=customSize||(test.sessionCount||10);
  const doShuffle=S.quizShuffle||false;
  const totalQ=test.questions.length;
  const totalSections=Math.ceil(totalQ/sessionSize);
  const userId=S.user?.id||'guest';
  const allResults=DB.results();

  const rows=Array.from({length:totalSections},(_,i)=>{
    const start=i*sessionSize+1;
    const end=Math.min((i+1)*sessionSize,totalQ);
    const prev=allResults.find(r=>r.testId===test.id&&r.sessionIdx===i&&r.userId===userId);
    let badge='';
    if(prev){
      const pct=prev.score/prev.total;
      const cls=pct>=0.7?'':pct>=0.5?' mid':' low';
      badge=`<span class="session-score${cls}">${prev.score}/${prev.total}</span>`;
    }
    return`<button class="session-row" onclick="startSession('${test.id}',${i})">
      <div style="flex:1;min-width:0">
        <div class="session-lbl">Session ${i+1}</div>
        <div class="session-range">Questions ${start}–${end}</div>
      </div>
      <span class="session-cnt">${end-start+1} Q</span>
      ${badge}
      <span class="session-arr"><i class="ti ti-arrow-right"></i></span>
    </button>`;
  }).join('');

  return`<div class="picker-wrap" style="max-width:560px">
    <div class="picker-card" style="text-align:left;padding:32px">
      <div class="picker-title">${esc(test.title)}</div>
      <div class="picker-sub">${totalQ} questions · ${sessionSize} per session · ${totalSections} session${totalSections!==1?'s':''}
        ${test.timerSeconds?` · ⏱ ${test.timerSeconds}s timer`:''}</div>

      <!-- Settings row -->
      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin:18px 0 14px">
        <!-- Custom session size -->
        <div style="flex:1;min-width:140px">
          <label class="fl" style="margin-bottom:6px"><i class="ti ti-list-numbers"></i> Questions per session</label>
          <div style="display:flex;gap:6px;align-items:center">
            <div class="count-chips" style="gap:5px">
              ${[5,10,15,20].map(n=>`<button class="chip${sessionSize===n&&!customSize||customSize===n?' on':''}"
                onclick="S.customSessionSize=${n};S.quizTestId='';S.quizQs=[];S.allQs=[];frame(pgQuiz('${test.id}'))"
                style="font-size:.78rem;min-width:36px">${n}</button>`).join('')}
            </div>
            <input type="number" min="1" max="${totalQ}" placeholder="?" value="${customSize&&![5,10,15,20].includes(customSize)?customSize:''}"
              style="width:56px;padding:6px 8px;background:var(--bg3);border:1.5px solid var(--border);
              border-radius:10px;color:var(--text);font-size:.82rem;text-align:center"
              oninput="const v=parseInt(this.value);if(v>0&&v<=${totalQ}){S.customSessionSize=v;S.quizTestId='';S.quizQs=[];S.allQs=[];frame(pgQuiz('${test.id}'))}">
          </div>
        </div>
        <!-- Shuffle toggle -->
        <div>
          <label class="fl" style="margin-bottom:6px"><i class="ti ti-arrows-shuffle"></i> Shuffle</label>
          <button onclick="S.quizShuffle=!S.quizShuffle;S.quizTestId='';S.quizQs=[];S.allQs=[];frame(pgQuiz('${test.id}'))"
            style="display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;cursor:pointer;font-size:.82rem;font-weight:700;
            border:1.5px solid ${doShuffle?'var(--accent)':'var(--border)'};
            background:${doShuffle?'rgba(124,92,255,.15)':'var(--bg3)'};
            color:${doShuffle?'var(--accent)':'var(--t2)'}">
            <i class="ti ${doShuffle?'ti-checks':'ti-arrows-shuffle'}"></i>
            ${doShuffle?'ON':'OFF'}
          </button>
        </div>
      </div>

      <div class="sessions-list">${rows}</div>
      <button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="go('${S.user?'/dashboard':'/login'}')"><i class="ti ti-arrow-left"></i> Back</button>
    </div>
  </div>`
}

function pgQuiz(rawId){
  const tests=DB.tests();
  const test=tests.find(t=>t.id===rawId||t.shareId===rawId.toUpperCase());
  if(!test)return`<div style="text-align:center;padding:80px 24px">
    <div class="empty-ico"><i class="ti ti-search"></i></div>
    <h2 style="font-size:1.5rem;margin-bottom:8px">Test not found</h2>
    <p style="color:var(--t3);margin-bottom:22px">Check the Test ID and try again.</p>
    <button class="btn btn-secondary" onclick="go('/login')">Go Home</button></div>`;

  const activeSession=S.quizTestId===test.id&&S.quizQs.length>0;
  if(!activeSession) return pgSessionList(test);

  const qi=S.qIdx, q=S.quizQs[qi], total=S.quizQs.length;
  const pct=Math.round(((qi+1)/total)*100);
  const sel=S.answers[qi];
  const isRevealed=!!S.revealed[qi];
  const answered=Object.keys(S.answers).length;
  const totalSections=Math.ceil(S.allQs.length/S.sessionSize);
  const sectionLabel=!S.isRetryWrong&&totalSections>1?`Section ${S.sectionIdx+1} of ${totalSections}`:'';
  const retryLabel=S.isRetryWrong?`Retrying ${total} wrong answer${total!==1?'s':''}`:'' ;

  const timerLeft=(S.qTimers[qi]!==undefined)?S.qTimers[qi]:S.timerSeconds;
  const timerPct=S.timerSeconds>0?Math.round((timerLeft/S.timerSeconds)*100):100;
  const timerCls=timerPct<30?' low':timerPct<60?' mid':'';

  const optionsHtml=q.options.map((o,i)=>{
    let cls='opt';
    if(isRevealed){
      cls+=' locked';
      if(o.correct&&sel===i) cls+=' ans-correct';
      else if(o.correct&&sel!==i) cls+=' ans-reveal';
      else if(!o.correct&&sel===i) cls+=' ans-wrong';
    } else {
      if(sel===i) cls+=' sel';
    }
    const mark=isRevealed?(o.correct?'<i class="ti ti-check"></i>':(sel===i?'<i class="ti ti-x"></i>':String.fromCharCode(65+i))):String.fromCharCode(65+i);
    return`<div class="${cls}" ${isRevealed?'':` onclick="pickAns(${i},'${test.id}')"`}>
      <div class="opt-mark">${mark}</div>
      <div class="opt-txt">${esc(o.text)}</div>
    </div>`;
  }).join('');

  const isCorrect=sel!==undefined&&q.options[sel]?.correct;

  const feedbackHtml=isRevealed?`
    <div class="feedback-badge ${isCorrect?'ok':'err'}">
      ${isCorrect?'<i class="ti ti-check"></i> Correct!':sel!==undefined?'<i class="ti ti-x"></i> Wrong — correct answer highlighted':'⏱ Time\'s up — correct answer highlighted'}
    </div>
    ${q.explanation?`<div class="expl-box"><div class="expl-lbl">Explanation</div>${esc(q.explanation)}</div>`:''}
  `:'';

  return`<div class="quiz-wrap">
    <div class="quiz-hd">
      ${sectionLabel?`<div class="section-badge"><i class="ti ti-folder"></i> ${sectionLabel}</div>`:''}
      ${retryLabel?`<div class="section-badge" style="background:rgba(255,90,122,.1);border-color:rgba(255,90,122,.3);color:var(--err)">↺ ${retryLabel}</div>`:''}
      <div class="quiz-name">${esc(test.title)}</div>
      ${S.streak>=3?`<div class="streak-badge"><i class="ti ti-flame"></i> ${S.streak} in a row!</div>`:''}
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-lbl"><span>Question ${qi+1} of ${total}</span><span>${pct}%</span></div>
    </div>
    <div class="qcard ${S.qDir==='left'?'slide-left':'slide-right'}">
      ${S.timerSeconds>0&&!isRevealed?`
        <div class="timer-bar-wrap${timerLeft>0&&timerLeft<=10?' urgent':''}" id="timer-bar-wrap">
          <div class="timer-fill${timerCls}" id="timer-bar-fill" style="width:${timerPct}%"></div>
        </div>
        <div class="timer-row${timerLeft>0&&timerLeft<=10?' urgent-lbl':''}">
          <span>⏱ Timer</span>
          <span id="timer-lbl" style="font-weight:700">${timerLeft}s</span>
        </div>`:''}
      <div class="q-num">Question ${qi+1}</div>
      <div class="q-text">${esc(q.text)}</div>
      <div class="opts">${optionsHtml}</div>
      ${feedbackHtml}
    </div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" ${qi===0?'disabled':''} onclick="prevQ('${test.id}')"><i class="ti ti-arrow-left"></i> Previous</button>
      <button class="btn btn-ghost btn-sm" onclick="showKeyboardShortcuts()" title="Keyboard shortcuts"
        style="font-size:.75rem;opacity:.55;padding:6px 9px">?</button>
      ${qi<total-1
        ?`<button class="btn btn-primary" onclick="nextQ('${test.id}')">Next <i class="ti ti-arrow-right"></i></button>`
        :`<button class="btn btn-primary" onclick="submitQuiz('${test.id}')">Submit Quiz</button>`}
    </div>
  </div>`
}

function pgResults(rawId){
  const tests=DB.tests();
  const test=tests.find(t=>t.id===rawId||t.shareId===rawId.toUpperCase());
  if(!test)return`<div style="text-align:center;padding:60px">Test not found. <a href="#/dashboard" style="color:var(--al)">Go home</a></div>`;

  const qs=S.quizQs.length?S.quizQs:test.questions;
  let correct=0;
  const bkd=qs.map((q,i)=>{
    const ans=S.answers[i];
    const isOk=ans!==undefined&&q.options[ans]?.correct;
    if(isOk)correct++;
    return{q,isOk,ans,correctOpt:q.options.find(o=>o.correct),selectedOpt:ans!==undefined?q.options[ans]:null};
  });

  const total=qs.length;
  const unanswered=total-Object.keys(S.answers).length;
  const wrong=total-correct-unanswered;
  const wrongCount=wrong+unanswered;
  const pct=Math.round((correct/total)*100);

  const r=80,circ=2*Math.PI*r;
  const offset=circ-(pct/100)*circ;
  const rc=pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444';
  const rc2=pct>=70?'#34d399':pct>=50?'#fbbf24':'#f87171';
  const grade=pct>=90?'Excellent!':pct>=70?'Good job!':pct>=50?'Keep practicing':'Needs improvement';
  const emoji=pct>=90?'<i class="ti ti-trophy"></i>':pct>=70?'<i class="ti ti-target"></i>':pct>=40?'<i class="ti ti-mood-puzzled"></i>':'<i class="ti ti-mood-sad"></i>';
  // Plain emoji (no HTML) for canvas image + share text
  const plainEmoji=pct>=90?'🏆':pct>=70?'🎯':pct>=40?'🤔':'😓';
  // Store result in state so share buttons need NO string args (avoids HTML-attribute escaping bugs)
  S.lastResult={pct,title:test.title,correct,total,emoji:plainEmoji,grade};

  const hasNext=!S.isRetryWrong&&(S.sectionIdx+1)*S.sessionSize<S.allQs.length;
  const nextStart=(S.sectionIdx+1)*S.sessionSize+1;
  const nextEnd=Math.min((S.sectionIdx+2)*S.sessionSize,S.allQs.length);
  const totalSec=Math.ceil(S.allQs.length/S.sessionSize);

  return`<div class="res-wrap">
    <div class="res-hd">
      <div class="res-emoji">${emoji}</div>
      <h1>${grade}</h1>
      <p>${esc(test.title)}${S.isRetryWrong?' · Retry Mode':''}</p>
    </div>
    <div class="ring-wrap">
      <svg width="200" height="200" class="ring-svg" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:${rc}"/>
            <stop offset="100%" style="stop-color:${rc2}"/>
          </linearGradient>
        </defs>
        <circle fill="none" stroke="var(--border)" stroke-width="12" cx="100" cy="100" r="${r}"/>
        <circle id="rfill" fill="none" stroke="url(#rg)" stroke-width="12" stroke-linecap="round"
          cx="100" cy="100" r="${r}"
          stroke-dasharray="${circ.toFixed(2)}"
          stroke-dashoffset="${circ.toFixed(2)}"
          data-target="${offset.toFixed(2)}"/>
      </svg>
      <div class="ring-txt">
        <div class="ring-pct">${pct}%</div>
        <div class="ring-lbl">${correct}/${total} correct</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-val ok">${correct}</div><div class="stat-lbl">Correct</div></div>
      <div class="stat"><div class="stat-val err">${wrong}</div><div class="stat-lbl">Wrong</div></div>
      <div class="stat"><div class="stat-val warn">${unanswered}</div><div class="stat-lbl">Skipped</div></div>
    </div>

    <div style="background:linear-gradient(135deg,rgba(124,92,255,.12),rgba(99,102,241,.08));
      border:1.5px solid rgba(124,92,255,.3);border-radius:20px;padding:22px 24px;
      margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;
      flex-wrap:wrap;gap:14px">
      <div>
        <div style="font-size:.72rem;color:var(--al);font-weight:800;text-transform:uppercase;
          letter-spacing:.08em;margin-bottom:4px">Share your result</div>
        <div style="font-family:'Clash Display',sans-serif;font-size:1.1rem;font-weight:700;
          letter-spacing:-.02em">${emoji} ${pct}% on ${esc(test.title)}</div>
        <div style="font-size:.8rem;color:var(--t3);margin-top:2px">${correct}/${total} correct · ${grade}</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-secondary btn-sm" onclick="shareResultAsImage()">
          <i class="ti ti-photo"></i> Share Image
        </button>
        <button class="btn btn-secondary btn-sm" onclick="shareResult()">
          <i class="ti ti-clipboard"></i> Copy text
        </button>
      </div>
    </div>
    ${!S.user?`<div class="guest-cta">
      <h3>Save your progress</h3>
      <p>Create a free account to track scores, access all sessions, and build your own quizzes.</p>
      <button class="btn btn-primary btn-lg" onclick="go('/register')">Get Started — It's Free</button>
    </div>`:''}

    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;
      padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;
      justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div style="font-size:.875rem;color:var(--t2)">
        ${!S.isRetryWrong&&totalSec>1?`Section ${S.sectionIdx+1} of ${totalSec} · ${S.allQs.length} questions total`:
          S.isRetryWrong?'Retry mode — wrong answers only':`${S.allQs.length} questions total`}
      </div>
      ${hasNext?`<div style="font-size:.8rem;color:var(--t3)">Next: Q${nextStart}–${nextEnd}</div>`
        :!S.isRetryWrong?`<div style="font-size:.8rem;color:var(--ok)"><i class="ti ti-check"></i> All sections complete</div>`:''}
    </div>

    <div class="res-btns">
      ${wrongCount>0?`<button class="btn btn-secondary btn-lg" onclick="retryWrong('${test.id}')"><i class="ti ti-refresh"></i> Retry ${wrongCount} Wrong</button>`:''}
      ${hasNext?`<button class="btn btn-primary btn-lg" onclick="nextSection('${test.id}')">Next Section <i class="ti ti-arrow-right"></i></button>`:''}
      <button class="btn btn-secondary btn-lg" onclick="retryQuiz('${test.id}')">Retry Section</button>
      <button class="btn btn-ghost btn-lg" onclick="go('${S.user?'/dashboard':'/login'}')">
        ${S.user?'Dashboard':'Home'}
      </button>
    </div>

    ${(()=>{
      const clusters=computeMasteryMap(qs,S.answers);
      if(clusters.length<2)return'';
      return`<div class="mastery-section">
        <div class="mastery-title"><i class="ti ti-map"></i> Mastery Map</div>
        <div class="mastery-sub">How well do you know each topic?</div>
        <div class="mastery-grid">
          ${clusters.map(c=>{
            const p=Math.round((c.correct/c.total)*100);
            const clr=p>=80?'var(--ok)':p>=50?'var(--warn)':'var(--err)';
            return`<div class="mastery-card">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <div style="font-size:.82rem;font-weight:700;color:var(--text);text-transform:capitalize;
                  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px">${esc(c.topic)}</div>
                <div style="font-size:.82rem;font-weight:800;color:${clr}">${p}%</div>
              </div>
              <div class="mastery-bar-bg">
                <div class="mastery-bar-fill" style="width:${p}%;background:${clr}"></div>
              </div>
              <div style="font-size:.72rem;color:var(--t3);margin-top:6px">${c.correct}/${c.total} correct</div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    })()}

    <div class="bkd-title" style="margin-top:36px">Question Review</div>
    ${bkd.map((b,i)=>`
      <div class="bkd-item ${b.isOk?'ok-item':'err-item'}">
        <div class="bkd-q">${i+1}. ${esc(b.q.text)}</div>
        <div class="bkd-ans">${b.isOk
          ?`<span class="ok-t"><i class="ti ti-check"></i> ${esc(b.correctOpt?.text||'')}</span>`
          :`${b.selectedOpt?`Your answer: <span class="err-t">${esc(b.selectedOpt.text)}</span>`:'<span style="color:var(--t3)">Not answered</span>'}
           ${b.correctOpt?` · Correct: <span class="ok-t">${esc(b.correctOpt.text)}</span>`:''}`
        }</div>
        ${b.q.explanation&&!b.isOk?`<div style="margin-top:6px;font-size:.78rem;color:var(--t3)"><i class="ti ti-message-circle"></i> ${esc(b.q.explanation)}</div>`:''}
      </div>`).join('')}
  </div>`
}

function pgBrowse(){

      <div class="share-id" onclick="event.stopPropagation();copy('${shareLink(tst.shareId)}');toast('Link copied!')" style="font-size:.7rem"><i class="ti ti-link"></i> ${tst.shareId}</div>

    <br>${S.user?`<button class="btn btn-primary" onclick="go('/upload')">${t('createTestBtn')}</button>`

      </div>
      ${S.user?`<button class="btn btn-primary" onclick="go('/upload')"><i class="ti ti-plus"></i> ${t('uploadTest')}</button>`
        :`<button class="btn btn-secondary" onclick="go('/login')">${t('signIn')}</button>`}
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
      <input class="dash-search" placeholder="🔍 Search tests…" value="${esc(S.browseSearch||'')}"

// ── GAME: HOST SHELL (attaches Firebase listener, renders into <main>) ──────
function pgHostGame(pin){
  S.gamePin=pin;S.gameRole='host';
  requestAnimationFrame(()=>{
    detachGameListener();
    S.gameRef=fbOn('games/'+pin,game=>{
      S.gameData=game;
      const m=document.querySelector('main');if(!m)return;
      if(!game){go('/dashboard');return}
      if(game.status==='lobby')       m.innerHTML=renderHostLobby(pin,game);
      else if(game.status==='question')       m.innerHTML=renderHostQuestion(pin,game);
      else if(game.status==='showing_results')m.innerHTML=renderHostResults(pin,game);
      else if(game.status==='final')  m.innerHTML=renderGameFinal(pin,game,'host');
      bind();
    });
  });
  return`<div style="text-align:center;padding:80px 24px">
    <div class="spinner"></div>
    <p style="color:var(--t2);margin-top:16px">Connecting to game…</p>
  </div>`
}

// ── GAME: PLAYER SHELL ──────────────────────────────────────────────────────
function pgPlay(pin,playerId){
  S.gamePin=pin;S.gamePlayerId=playerId;S.gameRole='player';
  requestAnimationFrame(()=>{
    detachGameListener();
    S.gameRef=fbOn('games/'+pin,game=>{
      S.gameData=game;
      const m=document.querySelector('main');if(!m)return;
      if(!game){
        m.innerHTML=`<div style="text-align:center;padding:80px 24px">
          <div style="font-size:3rem;margin-bottom:14px">🔚</div>
          <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">Game ended</div>
          <button class="btn btn-secondary" onclick="go('/join')">Join another</button></div>`;
        return;
      }
      const qi=game.questionIdx;
      if(game.status==='lobby')                            m.innerHTML=renderPlayerLobby(pin,playerId,game);
      else if(game.status==='question'&&game.answers?.[qi]?.[playerId]) m.innerHTML=renderPlayerWaiting(pin,playerId,game);
      else if(game.status==='question')                    m.innerHTML=renderPlayerQuestion(pin,playerId,game);
      else if(game.status==='showing_results')             m.innerHTML=renderPlayerResults(pin,playerId,game);
      else if(game.status==='final')                       m.innerHTML=renderGameFinal(pin,game,'player',playerId);
      bind();
    });
  });
  return`<div style="text-align:center;padding:80px 24px">
    <div class="spinner"></div>
    <p style="color:var(--t2);margin-top:16px">Joining game…</p>
  </div>`
}

  const lb=Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>b.score-a.score).slice(0,5);

// ── EDIT ANSWERS ────────────────────────────────────────────────────────────
function pgEditAnswers(testId){
  const test=DB.tests().find(t=>t.id===testId);
  if(!test)return`<div style="text-align:center;padding:80px 24px;color:var(--t3)">Test not found.</div>`;
  if(!S.user||S.user.id!==test.creatorId)return`<div style="text-align:center;padding:80px 24px">
    <div style="font-size:2.5rem;margin-bottom:14px">🔒</div>
    <p style="color:var(--t3);margin-bottom:20px;font-size:.95rem">Only the quiz creator can edit answers.</p>
    <button class="btn btn-secondary" onclick="go('/login')">Go Home</button></div>`;
  const noAnsCount=test.questions.filter(q=>!q.options.some(o=>o.correct)).length;
  const multiCount=test.questions.filter(q=>q.options.filter(o=>o.correct).length>1).length;
  const problemCount=noAnsCount+multiCount;
  return`<div class="upload-wrap">
    <div class="back-row">
      <div class="back-btn" onclick="go('/dashboard')"><i class="ti ti-arrow-left"></i></div>
      <h1 style="font-family:'Clash Display',sans-serif;font-size:1.4rem;font-weight:700;letter-spacing:-.02em">Edit Answers</h1>
    </div>
    <div class="save-bar">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:1rem;margin-bottom:3px">${esc(test.title)}</div>
        <div style="font-size:.8rem;color:${problemCount?'var(--warn)':'var(--ok)'};font-weight:600">
          ${problemCount
            ?`<i class="ti ti-alert-triangle"></i> ${problemCount} question${problemCount>1?'s':''} need attention${noAnsCount?' · '+noAnsCount+' no answer':''}${multiCount?' · '+multiCount+' multiple correct':''}`
            :'<i class="ti ti-check"></i> All questions have exactly one correct answer'}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;align-self:flex-end">
        <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
          <div>
            <label class="fl" style="margin-bottom:6px">Timer / Q</label>
            <select class="fi" style="padding:8px 12px;font-size:.82rem;width:auto"
              onchange="editSetting('${testId}','timerSeconds',parseInt(this.value))">
              <option value="0" ${!test.timerSeconds?'selected':''}>No timer</option>
              <option value="30" ${test.timerSeconds==30?'selected':''}>30 sec</option>
              <option value="45" ${test.timerSeconds==45?'selected':''}>45 sec</option>
              <option value="60" ${test.timerSeconds==60?'selected':''}>1 min</option>
              <option value="90" ${test.timerSeconds==90?'selected':''}>90 sec</option>
              <option value="120" ${test.timerSeconds==120?'selected':''}>2 min</option>
            </select>
          </div>
          <div>
            <label class="fl" style="margin-bottom:8px">Questions / session</label>
            <div style="display:flex;gap:6px;flex-wrap:wrap">
              ${[10,15,20,25,30,test.questions.length].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>a-b).map(n=>`
                <button class="chip${(test.sessionCount||10)===n?' on':''}"
                  onclick="editSetting('${testId}','sessionCount',${n});document.querySelectorAll('.sess-chip').forEach(b=>{b.classList.remove('on')});this.classList.add('on')"
                  style="min-width:44px;font-size:.8rem" class="chip sess-chip">
                  ${n===test.questions.length?`All (${n})`:n}
                </button>`).join('')}
            </div>
          </div>
          <div style="padding-bottom:4px">
            <label class="fl" style="margin-bottom:8px">Visibility</label>
            <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:.875rem;font-weight:600;color:var(--t2)">
              <input type="checkbox" ${test.isPublic?'checked':''}
                style="accent-color:var(--accent);width:16px;height:16px"
                onchange="editSetting('${testId}','isPublic',this.checked)">
              <i class="ti ti-world"></i> Public
            </label>
          </div>
        </div>
        <button class="btn btn-primary" onclick="go('/dashboard')">Done <i class="ti ti-arrow-right"></i></button>
      </div>
