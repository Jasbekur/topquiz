    <p style="font-size:.82rem;color:var(--t3);margin-bottom:20px;font-weight:500">
      Click an option to mark it correct · <i class="ti ti-pencil"></i> to edit text · Split to divide merged questions
    </p>
    <div id="edit-questions-list">
    ${test.questions.map((q,i)=>`
      ${buildQCard(testId,test,q,i)}
      <div class="insert-q-divider">
        <button onclick="insertQuestion('${testId}',${i})">+ Add question here</button>
      </div>`).join('')}
    </div>
  </div>`
}

function buildQCard(testId,test,q,i){
  const correctCount=q.options.filter(o=>o.correct).length;
  const hasCorrect=correctCount>0;
  const multiCorrect=correctCount>1;
  const tooMany=q.options.length>5;
  const needsFix=!hasCorrect||multiCorrect;
  return`<div class="qprev${needsFix?' needs-review':''}" id="qcard-${i}">
    <div class="qprev-n-row">
      <span class="qprev-n" style="margin-bottom:0">Question ${i+1}
        ${tooMany?`&nbsp;<span style="color:var(--warn);font-size:.68rem;font-weight:700;background:rgba(251,191,36,.1);padding:2px 7px;border-radius:999px">${q.options.length} options — possible merged question</span>`:''}
      </span>
      <div style="margin-left:auto;display:flex;gap:5px">
        <button class="btn btn-danger btn-sm" style="padding:4px 10px;font-size:.75rem"
          onclick="deleteQuestion('${testId}',${i})"><i class="ti ti-trash"></i> Delete</button>
      </div>
    </div>
    ${multiCorrect?`<div class="review-badge"><i class="ti ti-alert-triangle"></i> ${correctCount} correct answers — click the ONE right answer</div>`
      :!hasCorrect?`<div class="review-badge"><i class="ti ti-alert-triangle"></i> No correct answer — click one below</div>`:''}
    <div class="qprev-t" id="qt-${i}" style="display:flex;align-items:flex-start;gap:6px">
      <span style="flex:1">${esc(q.text)}</span>
      <button class="edit-icon-btn" onclick="editQText('${testId}',${i})" title="Edit question text"><i class="ti ti-pencil"></i></button>
    </div>
    <div id="opts-list-${i}">
      ${q.options.map((o,oi)=>`<div class="opt-prev ${o.correct?'c':'w'} pick" id="opt-${i}-${oi}"
        onclick="editMarkCorrect('${testId}',${i},${oi})">
        <span class="opt-check">${o.correct?'<i class="ti ti-check"></i>':'<i class="ti ti-circle"></i>'}</span>
        <span class="opt-text-span">${esc(o.text)}</span>
        <button class="edit-icon-btn" onclick="event.stopPropagation();editOptText('${testId}',${i},${oi})" title="Edit option"><i class="ti ti-pencil"></i></button>
        <button class="edit-icon-btn del" onclick="event.stopPropagation();deleteOption('${testId}',${i},${oi})" title="Delete option"><i class="ti ti-x"></i></button>
      </div>`).join('')}
    </div>
    <div id="add-opt-${i}" class="add-opt-wrap">
      <button class="btn btn-ghost btn-sm" style="font-size:.78rem" onclick="addOption('${testId}',${i})">+ Add option</button>
    </div>
  </div>`;
}

// Re-render edit page in-place without animation and preserve scroll position
function silentRender(testId){
  const y=window.scrollY;
  const main=document.querySelector('main');
  if(main){main.innerHTML=pgEditAnswers(testId);bind();}
  requestAnimationFrame(()=>window.scrollTo(0,y));
}

function editMarkCorrect(testId,qIdx,optIdx){
  const tests=DB.tests();
  const test=tests.find(t=>t.id===testId);
  if(!test)return;
  test.questions[qIdx].options.forEach((o,i)=>{o.correct=(i===optIdx);});
  DB.setTests(tests);
  // DOM-only update — no page refresh at all
  const card=document.getElementById(`qcard-${qIdx}`);
  if(!card){silentRender(testId);return;}
  card.classList.remove('needs-review');
  card.querySelectorAll('.review-badge,.review-hint').forEach(el=>el.remove());
  card.querySelectorAll(`#opts-list-${qIdx} .opt-prev`).forEach((el,i)=>{
    el.classList.remove('c','w');el.classList.add(i===optIdx?'c':'w');
    const chk=el.querySelector('.opt-check');
    if(chk)chk.innerHTML=i===optIdx?'<i class="ti ti-check"></i>':'<i class="ti ti-circle"></i>';
  });
}

function editSetting(testId,key,value){
  const tests=DB.tests();
  const test=tests.find(t=>t.id===testId);
  if(!test)return;
  test[key]=value;
  DB.setTests(tests);
  toast(key==='timerSeconds'?'Timer updated'
    :key==='sessionCount'?`Session size → ${value}`
    :`Test is now ${value?'public':'private'}`);
}

// ── INLINE QUESTION TEXT EDIT ───────────────────────────────────────────────
function editQText(testId,qIdx){
  const wrap=document.getElementById(`qt-${qIdx}`);
  if(!wrap)return;
  const test=DB.tests().find(t=>t.id===testId);
  const cur=test?.questions[qIdx]?.text||'';
  wrap.innerHTML=`
    <textarea class="fi" id="qti-${qIdx}" rows="3"
      style="width:100%;resize:vertical;font-size:.95rem;line-height:1.5">${esc(cur)}</textarea>
    <div class="inline-input-row">
      <button class="btn btn-primary btn-sm" onclick="saveQText('${testId}',${qIdx})">Save</button>
      <button class="btn btn-ghost btn-sm" onclick="cancelQText('${testId}',${qIdx})">Cancel</button>
    </div>`;
  const ta=document.getElementById(`qti-${qIdx}`);
  if(ta){ta.focus();ta.selectionStart=ta.value.length;}
  ta?.addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.ctrlKey||e.metaKey))saveQText(testId,qIdx);});
}
function saveQText(testId,qIdx){
  const val=(document.getElementById(`qti-${qIdx}`)?.value||'').trim();
  if(!val){toast('Question text cannot be empty','err');return;}
  const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
  test.questions[qIdx].text=val;DB.setTests(tests);
  const wrap=document.getElementById(`qt-${qIdx}`);
  if(wrap)wrap.innerHTML=`<span style="flex:1">${esc(val)}</span>
    <button class="edit-icon-btn" onclick="editQText('${testId}',${qIdx})" title="Edit question text"><i class="ti ti-pencil"></i></button>`;
  toast('Question saved');
}
function cancelQText(testId,qIdx){
  const test=DB.tests().find(t=>t.id===testId);
  const val=test?.questions[qIdx]?.text||'';
  const wrap=document.getElementById(`qt-${qIdx}`);
  if(wrap)wrap.innerHTML=`<span style="flex:1">${esc(val)}</span>
    <button class="edit-icon-btn" onclick="editQText('${testId}',${qIdx})" title="Edit question text"><i class="ti ti-pencil"></i></button>`;
}

// ── INLINE OPTION TEXT EDIT ─────────────────────────────────────────────────
function editOptText(testId,qIdx,optIdx){
  const el=document.getElementById(`opt-${qIdx}-${optIdx}`);
  if(!el)return;
  const test=DB.tests().find(t=>t.id===testId);
  const cur=test?.questions[qIdx]?.options[optIdx]?.text||'';
  el.onclick=null;
  el.innerHTML=`
    <input class="fi" id="oti-${qIdx}-${optIdx}" value="${esc(cur)}"
      style="flex:1;padding:8px 12px;font-size:.875rem">
    <button class="btn btn-primary btn-sm" onclick="saveOptText('${testId}',${qIdx},${optIdx})">Save</button>
    <button class="btn btn-ghost btn-sm" onclick="restoreOpt('${testId}',${qIdx},${optIdx})"><i class="ti ti-x"></i></button>`;
  const inp=document.getElementById(`oti-${qIdx}-${optIdx}`);
  if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}
  inp?.addEventListener('keydown',e=>{
    if(e.key==='Enter')saveOptText(testId,qIdx,optIdx);
    if(e.key==='Escape')restoreOpt(testId,qIdx,optIdx);
  });
}
function saveOptText(testId,qIdx,optIdx){
  const val=(document.getElementById(`oti-${qIdx}-${optIdx}`)?.value||'').trim();
  if(!val){toast('Option text cannot be empty','err');return;}
  const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
  test.questions[qIdx].options[optIdx].text=val;DB.setTests(tests);
  restoreOpt(testId,qIdx,optIdx);
  toast('Option saved');
}
function restoreOpt(testId,qIdx,optIdx){
  const el=document.getElementById(`opt-${qIdx}-${optIdx}`);
  if(!el)return;
  const test=DB.tests().find(t=>t.id===testId);
  const o=test?.questions[qIdx]?.options[optIdx];
  if(!o){el.remove();return;}
  el.className=`opt-prev ${o.correct?'c':'w'} pick`;
  el.onclick=()=>editMarkCorrect(testId,qIdx,optIdx);
  el.innerHTML=`<span class="opt-check">${o.correct?'<i class="ti ti-check"></i>':'<i class="ti ti-circle"></i>'}</span>
    <span class="opt-text-span">${esc(o.text)}</span>
    <button class="edit-icon-btn" onclick="event.stopPropagation();editOptText('${testId}',${qIdx},${optIdx})" title="Edit option"><i class="ti ti-pencil"></i></button>
    <button class="edit-icon-btn del" onclick="event.stopPropagation();deleteOption('${testId}',${qIdx},${optIdx})" title="Delete option"><i class="ti ti-x"></i></button>`;
}

// ── ADD / DELETE OPTION ─────────────────────────────────────────────────────
function addOption(testId,qIdx){
  const wrap=document.getElementById(`add-opt-${qIdx}`);
  if(!wrap)return;
  wrap.innerHTML=`<div class="inline-input-row">
    <input class="fi" id="new-opt-${qIdx}" placeholder="New option text"
      style="flex:1;padding:8px 12px;font-size:.875rem">
    <button class="btn btn-primary btn-sm" onclick="saveNewOption('${testId}',${qIdx})">Add</button>
    <button class="btn btn-ghost btn-sm" onclick="cancelAddOpt('${testId}',${qIdx})"><i class="ti ti-x"></i></button>
  </div>`;
  const inp=document.getElementById(`new-opt-${qIdx}`);
  if(inp){inp.focus();}
  inp?.addEventListener('keydown',e=>{
    if(e.key==='Enter')saveNewOption(testId,qIdx);
    if(e.key==='Escape')cancelAddOpt(testId,qIdx);
  });
}
function cancelAddOpt(testId,qIdx){
  const wrap=document.getElementById(`add-opt-${qIdx}`);
  if(wrap)wrap.innerHTML=`<button class="btn btn-ghost btn-sm" style="font-size:.78rem"
    onclick="addOption('${testId}',${qIdx})">+ Add option</button>`;
}
function saveNewOption(testId,qIdx){
  const val=(document.getElementById(`new-opt-${qIdx}`)?.value||'').trim();
  if(!val){toast('Enter option text','err');return;}
  const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
  const newIdx=test.questions[qIdx].options.length;
  test.questions[qIdx].options.push({text:val,correct:false});
  DB.setTests(tests);
  const list=document.getElementById(`opts-list-${qIdx}`);
  if(list){
    const d=document.createElement('div');
    d.id=`opt-${qIdx}-${newIdx}`;
    d.className='opt-prev w pick';
    d.onclick=()=>editMarkCorrect(testId,qIdx,newIdx);
    d.innerHTML=`<span class="opt-check"><i class="ti ti-circle"></i></span>
      <span class="opt-text-span">${esc(val)}</span>
      <button class="edit-icon-btn" onclick="event.stopPropagation();editOptText('${testId}',${qIdx},${newIdx})" title="Edit option"><i class="ti ti-pencil"></i></button>
      <button class="edit-icon-btn del" onclick="event.stopPropagation();deleteOption('${testId}',${qIdx},${newIdx})" title="Delete option"><i class="ti ti-x"></i></button>`;
    list.appendChild(d);
  }
  cancelAddOpt(testId,qIdx);
  toast('Option added — click it to mark as correct');
}
function deleteOption(testId,qIdx,optIdx){
  const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
  if(test.questions[qIdx].options.length<=2){toast('Need at least 2 options','err');return;}
  test.questions[qIdx].options.splice(optIdx,1);
  DB.setTests(tests);
  silentRender(testId);
}

// ── DELETE QUESTION ─────────────────────────────────────────────────────────
function deleteQuestion(testId,qIdx){
  modal('Delete Question',`Delete question ${qIdx+1}? This cannot be undone.`,()=>{
    const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
    test.questions.splice(qIdx,1);
    DB.setTests(tests);
    silentRender(testId);
    toast('Question deleted');
  },true);
}

// ── INSERT QUESTION ─────────────────────────────────────────────────────────
function insertQuestion(testId,afterIdx){
  const c=document.getElementById('modals');
  c.innerHTML=`<div class="overlay" id="moverlay">
    <div class="modal" style="max-width:560px;width:100%;max-height:90vh;overflow-y:auto">
      <div class="modal-title">New Question after #${afterIdx+1}</div>
      <div class="fg">
        <label class="fl">Question</label>
        <textarea class="fi" id="iq-text" rows="3"
          style="resize:vertical" placeholder="Type your question…"></textarea>
      </div>
      <label class="fl">Options — select the correct answer</label>
      ${[0,1,2,3].map(i=>`
        <div class="builder-opt-row" style="margin-bottom:10px">
          <input type="radio" name="iq-correct" value="${i}" id="iqr${i}">
          <input class="fi" type="text" id="iq-opt${i}"
            placeholder="Option ${String.fromCharCode(65+i)}"
            style="padding:10px 14px">
        </div>`).join('')}
      <div class="fg" style="margin-top:14px">
        <label class="fl">Explanation (optional)</label>
        <textarea class="fi" id="iq-expl" rows="2"
          style="resize:vertical" placeholder="Why is this the correct answer?"></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveInsertedQuestion('${testId}',${afterIdx})">Insert Question <i class="ti ti-arrow-right"></i></button>
      </div>
    </div>
  </div>`;
  document.getElementById('moverlay').addEventListener('click',e=>{if(e.target.id==='moverlay')closeModal();});
  document.getElementById('iq-text')?.focus();
}
function saveInsertedQuestion(testId,afterIdx){
  const text=(document.getElementById('iq-text')?.value||'').trim();
  if(!text){toast('Enter question text','err');return;}
  const correctRadio=document.querySelector('input[name="iq-correct"]:checked');
  const correctIdx=correctRadio?parseInt(correctRadio.value):-1;
  // No strict option/correct-answer requirement here — fix in Edit Answers after insert
  const opts=[0,1,2,3].map(i=>({
    text:(document.getElementById(`iq-opt${i}`)?.value||'').trim(),
    correct:i===correctIdx
  })).filter(o=>o.text);
  const expl=(document.getElementById('iq-expl')?.value||'').trim();
  const newQ={id:uid(),text,options:opts,explanation:expl};
  const tests=DB.tests();const test=tests.find(t=>t.id===testId);if(!test)return;
  test.questions.splice(afterIdx+1,0,newQ); // insert AFTER afterIdx
  DB.setTests(tests);
  closeModal();
  silentRender(testId);
  // Scroll to the newly inserted card
  requestAnimationFrame(()=>{
    const card=document.getElementById(`qcard-${afterIdx+1}`);
    if(card)card.scrollIntoView({behavior:'smooth',block:'center'});
  });
  toast(`Question ${afterIdx+2} inserted`);
}

// ── GAME ACTIONS ───────────────────────────────────────────────────────────
async function handleJoinGame(){
  const pin=(document.getElementById('join-pin')?.value||'').trim();
  const name=(document.getElementById('join-name')?.value||'').trim();
  if(pin.length!==6){toast('Enter the 6-digit PIN','err');return}
  if(!name){toast('Enter your nickname','err');return}
  const game=await fbGet('games/'+pin);
  if(!game){toast('Game not found — check the PIN','err');return}
  if(game.status!=='lobby'){toast('This game has already started','err');return}
  const playerId=uid(8);
  const avatars=['🦊','🐼','🦁','🐸','🦋','🐙','🦄','🐳','🦅','🐺','🐯','🦉','🦩','🐧','🦜'];
  const avatar=avatars[Math.floor(Math.random()*avatars.length)];
  await fbSet('games/'+pin+'/players/'+playerId,{name,avatar,score:0,joined:fbTS()});
  S.gamePin=pin;S.gamePlayerId=playerId;S.gameRole='player';
  go('/play/'+pin+'/'+playerId);
}

async function createAndHostGame(testId){
  if(!S.user){toast('Sign in to host a game','err');return}
  const test=DB.tests().find(t=>t.id===testId);
  if(!test){toast('Test not found','err');return}
  toast('Creating game…');
  // Generate unique 6-digit PIN
  let pin,exists;
  do{pin=Math.floor(100000+Math.random()*900000).toString();exists=await fbGet('games/'+pin);}
  while(exists);
  const qs=test.questions.slice(0,test.sessionCount||test.questions.length).map(q=>({
    id:q.id,text:q.text,
    options:q.options.map(o=>({text:o.text,correct:o.correct})),
    explanation:q.explanation||''
  }));
  await fbSet('games/'+pin,{
    status:'lobby',testId,testTitle:test.title,hostId:S.user.id,
    questionIdx:-1,timerSeconds:test.timerSeconds||20,
    totalQuestions:qs.length,questions:qs,
    createdAt:fbTS(),players:{}
  });
  S.gamePin=pin;S.gameRole='host';
  go('/host-game/'+pin);
}

async function startHostGame(pin){
  const game=await fbGet('games/'+pin);
  if(!game?.players||Object.keys(game.players).length===0){
    toast('Need at least 1 player to start','err');return;
  }
  await _advanceQuestion(pin,0,game.timerSeconds);
}

async function nextGameQuestion(pin){
  const game=await fbGet('games/'+pin);
  const next=(game.questionIdx||0)+1;
  if(next>=game.totalQuestions){await showFinalPodium(pin);return}
  await _advanceQuestion(pin,next,game.timerSeconds);
}

async function _advanceQuestion(pin,idx,timerSeconds){
  // Clear answers for this index, set new status
  await fbUpdate('games/'+pin,{
    status:'question',questionIdx:idx,questionStart:Date.now()
  });
  await fbSet('games/'+pin+'/answers/'+idx,null);
}

async function showGameResults(pin){
  clearInterval(S.hostTimerItv);S.hostTimerItv=null;
  await fbUpdate('games/'+pin,{status:'showing_results'});
}

async function showFinalPodium(pin){
  await fbUpdate('games/'+pin,{status:'final'});
}

async function endHostGame(pin){
  await fbSet('games/'+pin,null);
  detachGameListener();S.gamePin=null;S.gameRole=null;
  go('/dashboard');
}

async function handlePlayerAnswer(pin,playerId,optionIdx,btn){
  // Optimistic UI — disable all buttons immediately
  document.querySelectorAll('.game-opt').forEach(b=>{b.classList.add('answered');});
  const game=await fbGet('games/'+pin);
  if(!game||game.status!=='question'){return}
  const qi=game.questionIdx;
  const existing=await fbGet('games/'+pin+'/answers/'+qi+'/'+playerId);
  if(existing)return; // already answered
  const q=game.questions[qi];
  const isCorrect=!!(q.options[optionIdx]?.correct);
  const timeTaken=Math.min((Date.now()-game.questionStart)/1000,game.timerSeconds);
  const timerSeconds=game.timerSeconds||20;
  const points=isCorrect?Math.round(1000+500*Math.max(0,1-timeTaken/timerSeconds)):0;
  await fbSet('games/'+pin+'/answers/'+qi+'/'+playerId,{optionIdx,correct:isCorrect,timeTaken,points});
  const player=await fbGet('games/'+pin+'/players/'+playerId);
  await fbUpdate('games/'+pin+'/players/'+playerId,{score:(player?.score||0)+points});
}

function bind(){
  const dz=document.getElementById('dz');
  if(dz){
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('over')});
    dz.addEventListener('dragleave',()=>dz.classList.remove('over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('over');
      const f=e.dataTransfer.files[0];if(f)processFile(f);
    });
  }
  const lp=document.getElementById('lpw');
  if(lp)lp.addEventListener('keydown',e=>{if(e.key==='Enter')handleLogin()});
  const le=document.getElementById('lemail');
  if(le)le.addEventListener('keydown',e=>{if(e.key==='Enter')lp?.focus()});
  const gi=document.getElementById('gid');
  if(gi){
    gi.addEventListener('input',e=>{e.target.value=e.target.value.toUpperCase()});
    gi.addEventListener('keydown',e=>{if(e.key==='Enter')handleGuest()});
  }
  const rf=document.getElementById('rfill');
  if(rf){
    const target=parseFloat(rf.dataset.target);
    setTimeout(()=>{
      rf.style.transition='stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)';
      rf.style.strokeDashoffset=target;
    },80);
  }
  // ── HOST game countdown ──
  const htf=document.getElementById('host-timer-fill');
  if(htf&&S.gameData?.status==='question'){
    clearInterval(S.hostTimerItv);
    const tsec=S.gameData.timerSeconds||20;
    const qstart=S.gameData.questionStart||Date.now();
    S.hostTimerItv=setInterval(()=>{
      const elapsed=(Date.now()-qstart)/1000;
      const left=Math.max(0,tsec-elapsed);
      const pct=(left/tsec)*100;
      const f=document.getElementById('host-timer-fill');
      const l=document.getElementById('host-timer-lbl');
      if(!f){clearInterval(S.hostTimerItv);return}
      f.style.width=pct+'%';
      f.className='timer-fill'+(pct<30?' low':pct<60?' mid':'');
      if(l)l.textContent=Math.ceil(left)+'s';
      if(left<=0){clearInterval(S.hostTimerItv);showGameResults(S.gamePin);}
    },250);
  }
  // ── PLAYER game countdown ──
  const ptf=document.getElementById('ptimer-fill');
  if(ptf&&S.gameData?.status==='question'){
    clearInterval(S.playerTimerItv);
    const tsec=S.gameData.timerSeconds||20;
    const qstart=S.gameData.questionStart||Date.now();
    S.playerTimerItv=setInterval(()=>{
      const elapsed=(Date.now()-qstart)/1000;
      const left=Math.max(0,tsec-elapsed);
      const pct=(left/tsec)*100;
      const f=document.getElementById('ptimer-fill');
      const w=document.getElementById('ptimer-wrap');
      const l=document.getElementById('ptimer-lbl');
      if(!f){clearInterval(S.playerTimerItv);return}
      f.style.width=pct+'%';
      f.className='timer-fill'+(pct<30?' low':pct<60?' mid':'');
      if(w){if(pct<30&&pct>0)w.classList.add('urgent');else w.classList.remove('urgent');}
      if(l)l.textContent=Math.ceil(left)+'s';
      if(left<=0){
        clearInterval(S.playerTimerItv);
        document.querySelectorAll('.game-opt').forEach(b=>b.classList.add('answered'));
      }
    },250);
  }
  // Flashcard swipe
  const fcCard=document.getElementById('fc-swipe-card');
  if(fcCard&&fcCard.dataset.deckId){attachFcSwipe(fcCard.dataset.deckId);}
  // Ripple on all buttons
  document.querySelectorAll('.btn').forEach(btn=>{
    if(btn.dataset.ripple)return;btn.dataset.ripple='1';
    btn.addEventListener('click',function(e){
      const r=document.createElement('span');r.className='ripple';
      const rect=this.getBoundingClientRect();
      const size=Math.max(rect.width,rect.height);
      r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);setTimeout(()=>r.remove(),600);
    });
  });
  // Magnetic effect on primary buttons
  document.querySelectorAll('.btn-primary').forEach(btn=>{
    if(btn.dataset.magnet)return;btn.dataset.magnet='1';
    btn.addEventListener('mousemove',function(e){
      const r=this.getBoundingClientRect();
      const dx=(e.clientX-r.left-r.width/2)*0.22;
      const dy=(e.clientY-r.top-r.height/2)*0.22;
      this.style.transform=`translate(${dx}px,${dy}px)`;
    });
    btn.addEventListener('mouseleave',function(){this.style.transform='';});
  });
  // Landing number ticker
  document.querySelectorAll('[data-count]').forEach(el=>{
    if(el.dataset.counted)return;el.dataset.counted='1';
    const target=parseFloat(el.dataset.count);
    const suffix=el.dataset.suffix||'';
    const obs=new IntersectionObserver(entries=>{
      if(!entries[0].isIntersecting)return;obs.disconnect();
      let start=0;const dur=1400;const t0=performance.now();
      (function tick(now){
        const p=Math.min((now-t0)/dur,1);
        const ease=1-Math.pow(1-p,3);
        el.textContent=Math.round(start+(target-start)*ease).toLocaleString()+suffix;
        if(p<1)requestAnimationFrame(tick);
      })(t0);
    },{threshold:.5});
    obs.observe(el);
  });
}

function attachQuizKeys(testId){
  document.onkeydown=null;
  if(!location.hash.includes('/test/'))return;
  document.onkeydown=function(e){
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    const q=S.quizQs[S.qIdx];
    if(!q)return;
    if(['1','2','3','4'].includes(e.key)){
      const idx=parseInt(e.key)-1;
      if(idx<q.options.length&&!S.revealed[S.qIdx])pickAns(idx,testId);
    }
    if((e.key===' '||e.key==='ArrowRight')&&S.revealed[S.qIdx]){
      e.preventDefault();
      const total=S.quizQs.length;
      if(S.qIdx<total-1)nextQ(testId);
    }
    if(e.key==='ArrowLeft'&&S.qIdx>0){e.preventDefault();prevQ(testId);}
  };
}

async function handleGuest(rawId){
  // Accept id directly OR read from any input on the page
  const id=(rawId||
    (document.getElementById('gid')&&document.getElementById('gid').value)||
    (document.getElementById('landing-gid')&&document.getElementById('landing-gid').value)||
    '').trim().toUpperCase();
  if(id.length!==8){toast('Enter a valid 8-character Test ID','err');return}
  // First check localStorage
  let t=DB.tests().find(t=>t.shareId===id);
  if(!t){
    // Then check Firebase cloud
    try{
      toast('Searching...','info');
      const remote=await fbGet('tests/'+id);
      if(remote){
        const ts=DB.tests();
        if(!ts.find(x=>x.shareId===id)){ts.push(remote);DB.setTests(ts);}
        t=remote;
      }
    }catch(e){}
  }
  if(!t){toast('Test not found. Check the ID.','err');return}
  S.quizTestId='';S.quizQs=[];S.allQs=[];
  go(`/test/${t.id}`);
}
function pickFile(e){const f=e.target.files[0];if(f)processFile(f)}
function processFile(file){
  if(!file.name.endsWith('.docx')){toast('Please upload a .docx file','err');return}
  const dz=document.getElementById('dz');
  if(dz)dz.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:12px">
    <div class="spinner"></div><p style="color:var(--t2)">Parsing document…</p></div>`;
  const r=new FileReader();
  r.onload=e=>{
    mammoth.extractRawText({arrayBuffer:e.target.result}).then(res=>{
      const qs=parseDocx(res.value);
      if(!qs.length){toast('No valid questions found. Check the format.','err');S.parsedQs=[];frame(pgUpload());return}
      S.parsedQs=[...S.parsedQs,...qs];
      S.parsedName=S.parsedName||file.name.replace(/\.docx$/i,'').replace(/_/g,' ');
      frame(pgUpload());
      toast(`Parsed ${qs.length} question${qs.length!==1?'s':''}!`);
    }).catch(e=>{toast('Parse error: '+e.message,'err');frame(pgUpload())});
  };
  r.readAsArrayBuffer(file);
}

function saveTest(){
  const el=document.getElementById('ttitle');
  const title=(el?.value||'').trim();
  if(!title){toast('Please enter a test title','err');el?.focus();return}
  if(!S.parsedQs.length){toast('No questions to save','err');return}
  const multiCorrectQs=S.parsedQs.filter(q=>q.options.filter(o=>o.correct).length>1);
  if(multiCorrectQs.length){
    toast(`${multiCorrectQs.length} question${multiCorrectQs.length>1?'s have':' has'} multiple correct answers — click the ONE correct option`,'err');
    const firstIdx=S.parsedQs.findIndex(q=>q.options.filter(o=>o.correct).length>1);
    requestAnimationFrame(()=>{
      const cards=document.querySelectorAll('.qprev');
      if(cards[firstIdx])cards[firstIdx].scrollIntoView({block:'center',behavior:'smooth'});
    });
    return;
  }
  const tooFew=S.parsedQs.filter(q=>q.options.length<2);
  if(tooFew.length){
    toast(`${tooFew.length} question${tooFew.length>1?'s need':'needs'} at least 2 options — please add options`,'err');
    const firstIdx=S.parsedQs.findIndex(q=>q.options.length<2);
    requestAnimationFrame(()=>{
      const cards=document.querySelectorAll('.qprev');
      if(cards[firstIdx])cards[firstIdx].scrollIntoView({block:'center',behavior:'smooth'});
    });
    return;
  }
  const unresolved=S.parsedQs.filter(q=>!q.options.some(o=>o.correct));
  if(unresolved.length){
    toast(`${unresolved.length} question${unresolved.length>1?'s have':' has'} no correct answer — click the right option`,'err');
    const firstIdx=S.parsedQs.findIndex(q=>!q.options.some(o=>o.correct));
    requestAnimationFrame(()=>{
      const cards=document.querySelectorAll('.qprev');
      if(cards[firstIdx])cards[firstIdx].scrollIntoView({block:'center',behavior:'smooth'});
    });
    return;
  }
  const totalQs=S.parsedQs.length;
  const count=S.selectedCount||totalQs;
  const timerSeconds=S.uploadTimer||0;
  const isPublic=S.uploadIsPublic||false;
  const emoji=(document.getElementById('temoji')?.value||'📋').trim()||'📋';
  const rawTags=(document.getElementById('ttags')?.value||'');
  const tags=rawTags.split(',').map(s=>s.trim().toLowerCase()).filter(Boolean);
  const shuffleByDefault=S.uploadShuffle||false;
  const test={id:uid(),shareId:uid(8),title,creatorId:S.user.id,
    questions:S.parsedQs,sessionCount:count,timerSeconds,isPublic,emoji,tags,shuffleByDefault,at:Date.now()};
  const ts=DB.tests();ts.push(test);DB.setTests(ts);
  // Also save to Firebase so others can find by share ID
  fbSet('tests/'+test.shareId, test).catch(()=>{});
  S.parsedQs=[];S.parsedName='';S.selectedCount=0;S.builderOpen=false;
  S.uploadTimer=0;S.uploadIsPublic=false;S.uploadTags=[];S.uploadShuffle=false;
  toast(`"${title}" saved!${isPublic?' Published to library.':''}`);
  go('/dashboard');
}

// ── QUIZ NAVIGATION ─────────────────────────────────────────────────────────
function startSession(testId,sectionIdx){
  const test=DB.tests().find(t=>t.id===testId);
  if(!test)return;
  const sessionSize=(S.customSessionSize&&S.customSessionSize>0)?S.customSessionSize:(test.sessionCount||10);
  // Use quiz-time shuffle toggle; fall back to test's saved shuffleByDefault
  const doShuffle=S.quizShuffle!=null?S.quizShuffle:(test.shuffleByDefault||false);
  let all=test.questions.map(q=>({...q,options:shuffle(q.options)}));
  if(doShuffle) all=shuffle(all);
  S.allQs=all;S.sessionSize=sessionSize;S.sectionIdx=sectionIdx;
  S.quizTestId=testId;
  S.quizQs=all.slice(sectionIdx*sessionSize,(sectionIdx+1)*sessionSize);
  S.qIdx=0;S.answers={};S.revealed={};S.qTimers={};
  S.timerSeconds=test.timerSeconds||0;
  S.isRetryWrong=false;
  S.resultSaved=false;
  S.qDir='right';
  S.streak=0;S.milestonesHit={};
  history.replaceState(null,'','#/test/'+testId);
  renderQuiz(testId);
}

function nextSection(testId){
  S.sectionIdx++;
  const start=S.sectionIdx*S.sessionSize;
  if(!S.allQs.length){
    const dbTest=DB.tests().find(t=>t.id===testId);
    if(dbTest)S.allQs=dbTest.questions.map(q=>({...q,options:shuffle(q.options)}));
  }
  S.quizQs=S.allQs.slice(start,start+S.sessionSize);
  S.quizTestId=testId;
  S.qIdx=0;S.answers={};S.revealed={};S.qTimers={};
  S.isRetryWrong=false;
  S.resultSaved=false;
  S.qDir='right';
  history.replaceState(null,'','#/test/'+testId);
  renderQuiz(testId);
}

function retryQuiz(testId){
  S.qIdx=0;S.answers={};S.revealed={};S.qTimers={};
  S.quizTestId=testId;
  S.isRetryWrong=false;
  S.resultSaved=false;
  S.qDir='right';
  S.streak=0;S.milestonesHit={};
  history.replaceState(null,'','#/test/'+testId);
  renderQuiz(testId);
}

function retryWrong(testId){
  const wrongQs=S.quizQs.filter((_,i)=>{
    const ans=S.answers[i];
    return ans===undefined||!S.quizQs[i].options[ans]?.correct;
  });
  if(!wrongQs.length){toast('No wrong answers — great job!');return}
  S.quizQs=wrongQs;
  S.qIdx=0;S.answers={};S.revealed={};S.qTimers={};
  S.quizTestId=testId;
  S.isRetryWrong=true;
  S.resultSaved=false;
  S.qDir='right';
  S.streak=0;S.milestonesHit={};
  history.replaceState(null,'','#/test/'+testId);
  renderQuiz(testId);
}

function pickAns(optIdx,testId){
  if(S.revealed[S.qIdx])return;
  S.answers[S.qIdx]=optIdx;
  S.revealed[S.qIdx]=true;
  // Streak tracking
  const q=S.quizQs[S.qIdx];
  const isCorrect=q.options[optIdx]?.correct;
  if(isCorrect){
    S.streak++;
    if(S.streak>=3&&S.streak%3===0)toast(`🔥 ${S.streak} correct in a row!`,'ok');
  }else{
    S.streak=0;
  }
  // Animate chosen option immediately (before re-render)
  setTimeout(()=>{
    const chosen=document.querySelectorAll('.opt')[optIdx];
    if(isCorrect){chosen?.classList.add('correct-pulse');}
    else{chosen?.classList.add('shake');}
  },0);
  // Milestone confetti at 25 / 50 / 75 %
  const answeredCount=Object.keys(S.answers).length;
  const total=S.quizQs.length;
  const answeredPct=Math.round((answeredCount/total)*100);
  [25,50,75].forEach(m=>{
    if(answeredPct>=m&&!S.milestonesHit[m]){
      S.milestonesHit[m]=true;
      setTimeout(launchMiniConfetti,300);
      toast(`${m}% done — keep going! 💪`,'ok');
    }
  });
  // Don't clearTimer — global timer keeps counting other questions
  frame(pgQuiz(testId));
}

function prevQ(testId){
  if(S.qIdx>0){S.qDir='left';S.qIdx--;renderQuiz(testId);}
}
function nextQ(testId){
  if(S.qIdx<S.quizQs.length-1){S.qDir='right';S.qIdx++;renderQuiz(testId);}
}

function submitQuiz(testId){
  const un=S.quizQs.length-Object.keys(S.answers).length;
  const doSubmit=()=>{
    saveResult(testId);
    updateSpacedRep(testId);
    const qs=S.quizQs;
    let correct=0;
    qs.forEach((q,i)=>{const ans=S.answers[i];if(ans!==undefined&&q.options[ans]?.correct)correct++;});
    const pct=correct/qs.length;
    // Challenge mode — post score to Firebase and redirect to challenge page
    if(window._challengeCtx&&window._challengeCtx.testId===testId){
      submitChallengeResult(testId,correct,qs.length);
      return;
    }
    history.replaceState(null,'','#/results/'+testId);
    frame(pgResults(testId));
    if(pct>=0.7)setTimeout(launchConfetti,350);
  };
  if(un>0){
    modal('Submit Quiz?',
      `You have ${un} unanswered question${un>1?'s':''}. Submit anyway?`,
      doSubmit);
  }else{
    doSubmit();
  }
}

// ── SPACED REPETITION (SM-2 approximation) ──────────────────────────────────
// Wrong answers get nextReview = 1 day; correct answers double the interval (max 21 days).
function updateSpacedRep(testId){
  const qs=S.quizQs;
  let sr=DB.sr();
  qs.forEach((q,i)=>{
    const ans=S.answers[i];
    const isOk=ans!==undefined&&q.options[ans]?.correct;
    const key=`${testId}_${q.id}`;
    const existing=sr.find(r=>r.key===key);
    if(!isOk){
      // Wrong — schedule review tomorrow (halve interval if was scheduled before)
      const interval=existing?Math.max(1,Math.floor((existing.interval||1)*0.5)):1;
      const nextReview=Date.now()+interval*24*60*60*1000;
      if(existing){existing.interval=interval;existing.nextReview=nextReview;}
      else{sr.push({key,testId,qId:q.id,interval,nextReview,level:0});}
    }else if(existing){
      // Correct — double interval (max 21 days)
      const interval=Math.min((existing.interval||1)*2,21);
      const nextReview=Date.now()+interval*24*60*60*1000;
      existing.interval=interval;existing.nextReview=nextReview;existing.level=(existing.level||0)+1;
    }
  });
  DB.setSr(sr);
}

function saveResult(testId){
  const qs=S.quizQs;

    if(ans!==undefined&&q.options[ans]?.correct)correct++;

  const userId=S.user?.id||'guest';

  if(idx>=0)all[idx]=entry;else all.push(entry);
  DB.setResults(all);

  try{

      fbGet('tests/'+test.shareId+'/plays').then(n=>{

}

// ── TIMER ──────────────────────────────────────────────────────────────────
function clearTimer(){
  if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}
}
// One global interval ticks ALL question timers simultaneously.
// Navigating away does NOT pause a question's countdown.
function startGlobalTimer(testId){
  clearTimer();
  S.timerInterval=setInterval(()=>{
    let rerenderNeeded=false;
    // Tick every visited, unrevealed question
    Object.keys(S.qTimers).forEach(k=>{
      const i=parseInt(k);
      if(!S.revealed[i]&&S.qTimers[i]>0){
        S.qTimers[i]--;
        if(S.qTimers[i]<=0){
          S.qTimers[i]=0;
          S.revealed[i]=true;          // time's up — auto-reveal as wrong
          if(i===S.qIdx)rerenderNeeded=true;
        }
      }
    });
    if(rerenderNeeded){
      // Current question expired — re-render with feedback
      frame(pgQuiz(testId));
    }else{
      // Just update the DOM bar for the currently visible question
      const bar=document.getElementById('timer-bar-fill');
      const lbl=document.getElementById('timer-lbl');
      const wrap=document.getElementById('timer-bar-wrap');
      const tRow=wrap?.nextElementSibling;
      const t=S.qTimers[S.qIdx];
      if(bar&&t!==undefined&&!S.revealed[S.qIdx]){
        const pct=(t/S.timerSeconds)*100;
        bar.style.width=pct+'%';
        bar.className='timer-fill'+(pct<30?' low':pct<60?' mid':'');
        if(lbl)lbl.textContent=t+'s';
        // Heartbeat urgency
        if(wrap){
          if(t<=10&&t>0){wrap.classList.add('urgent');if(tRow)tRow.classList.add('urgent-lbl');}
          else{wrap.classList.remove('urgent');if(tRow)tRow.classList.remove('urgent-lbl');}
        }
      }
    }
  },1000);
}
function renderQuiz(testId){
  // First visit to this question — initialise its countdown
  if(S.timerSeconds>0&&!S.revealed[S.qIdx]&&S.qTimers[S.qIdx]===undefined){
    S.qTimers[S.qIdx]=S.timerSeconds;
  }
  // Expose current remaining time so pgQuiz can render the bar correctly
  S.timerLeft=(S.qTimers[S.qIdx]!==undefined)?S.qTimers[S.qIdx]:S.timerSeconds;
  frame(pgQuiz(testId));
  attachQuizKeys(testId);
  if(S.timerSeconds>0){
    requestAnimationFrame(()=>{
      const bar=document.getElementById('timer-bar-fill');
      if(bar)bar.style.transition='width 1s linear';
      // Start global timer only once; keep it running across navigation
      if(!S.timerInterval)startGlobalTimer(testId);
    });
  }
}

// Robust parser for Gemini's labelled output format
function parseGeminiOutput(raw){
  const questions=[];
  // Split by --- separator (allow variations like ---, ——, blank lines between blocks)
  const blocks=raw.split(/\n---+\n|\n–––+\n|\n\*\*\*+\n/).map(b=>b.trim()).filter(Boolean);
  for(const block of blocks){
    const lines=block.split('\n').map(l=>l.trim()).filter(Boolean);
    let qText='',opts={},answer='',explanation='';
    let currentLabel='';
    for(const line of lines){
      // Match QUESTION:, A:, B:, C:, D:, ANSWER:, EXPLANATION:
      const m=line.match(/^(QUESTION|A|B|C|D|ANSWER|EXPLANATION)\s*[:：]\s*(.*)$/i);
      if(m){
        currentLabel=m[1].toUpperCase();
        const val=m[2].trim();
        if(currentLabel==='QUESTION')qText=val;
        else if(['A','B','C','D'].includes(currentLabel))opts[currentLabel]=val;
        else if(currentLabel==='ANSWER')answer=val.replace(/[^A-Da-d]/g,'').toUpperCase();
        else if(currentLabel==='EXPLANATION')explanation=val;
      }else if(currentLabel==='QUESTION'&&!Object.keys(opts).length){
        // Multi-line question text
        qText+=' '+line;
      }else if(currentLabel==='EXPLANATION'){
        explanation+=' '+line;
      }
    }
    if(!qText||!answer||Object.keys(opts).length<2)continue;
    const options=(['A','B','C','D']).filter(k=>opts[k]).map(k=>({
      text:opts[k],correct:k===answer
    }));
    if(options.length>=2&&options.some(o=>o.correct)){
      questions.push({id:uid(),text:qText.trim(),options,explanation:explanation.trim()});
    }
  }
  return questions;
}

async function createChallenge(testId){
  if(!S.user){toast('Sign in to challenge friends','err');return;}
  const tests=DB.tests();
  const test=tests.find(t=>t.id===testId);
  if(!test){toast('Test not found','err');return;}
  const challengeId=uid();
  const qs=test.questions.slice(0,10);
  await fbSet('challenges/'+challengeId,{
    id:challengeId,testId,testTitle:test.title,
    creatorId:S.user.id,creatorName:S.user.name,
    qs:qs.map(q=>({id:q.id,text:q.text,options:q.options})),
    status:'open',createdAt:fbTS()
  });
  const challenges=DB.challenges();
  challenges.push({id:challengeId,testId,testTitle:test.title,date:Date.now()});
  DB.setChallenges(challenges);
  const link=location.origin+location.pathname+'#/challenge/'+challengeId;
  copy(link);
  toast('Challenge link copied! 🔗 Share with a friend');
  go('/challenge/'+challengeId);
}

async function startChallengeQuiz(challengeId,isCreator){
  const ch=await fbGet('challenges/'+challengeId);
  if(!ch){toast('Challenge not found','err');return;}
  S.quizQs=ch.qs;
  S.answers={};S.revealed={};S.qIdx=0;S.isRetryWrong=false;
  S.resultSaved=false;S.qDir='right';S.streak=0;S.milestonesHit={};
  S.qTimers={};S.timerSeconds=0;S.timerLeft=0;
  // Temporarily patch a mini-test to use pgQuiz
  const fakeTest={id:'ch_'+challengeId,title:ch.testTitle,questions:ch.qs,timerSeconds:0,sessionCount:ch.qs.length};
  const tests=DB.tests();
  const existing=tests.find(t=>t.id===fakeTest.id);
  if(!existing){tests.push(fakeTest);DB.setTests(tests);}
  // Override submit to post score to Firebase
  window._challengeCtx={challengeId,isCreator,testId:'ch_'+challengeId,qs:ch.qs};
  frame(pgQuiz('ch_'+challengeId));
}

// Call this after submitQuiz detects a challenge context
async function submitChallengeResult(testId,correct,total){
  const ctx=window._challengeCtx;
  if(!ctx||ctx.testId!==testId)return;
  const field=ctx.isCreator?'creatorScore':'challengerScore';
  const nameField=ctx.isCreator?'creatorName':'challengerName';
  const update={};
  update[field]=correct;
  update[nameField]=S.user?.name||'Challenger';
  update.status='complete';
  await fbSet('challenges/'+ctx.challengeId,{...await fbGet('challenges/'+ctx.challengeId),...update});
  window._challengeCtx=null;
  toast(correct>=Math.ceil(total*.7)?'Great score! 🏆':'Good effort! Keep practicing');
  setTimeout(()=>go('/challenge/'+ctx.challengeId),600);
}

// ── MASTERY MAP ─────────────────────────────────────────────────────────────
function computeMasteryMap(qs,answers){
  // Group by simple keyword clusters from question text
  const clusters={};
  qs.forEach((q,i)=>{
    const isOk=answers[i]!==undefined&&q.options[answers[i]]?.correct;
    const words=q.text.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(w=>w.length>4);
    // Find best keyword (most frequent in remaining unclustered qs)
    const topic=words[0]||'General';
    if(!clusters[topic])clusters[topic]={topic,correct:0,total:0,questions:[]};
    clusters[topic].total++;
    if(isOk)clusters[topic].correct++;
    clusters[topic].questions.push(i);
  });
  return Object.values(clusters).sort((a,b)=>b.total-a.total).slice(0,8);
}

// ── DAILY STREAK ────────────────────────────────────────────────────────────
function tickStudyStreak(){
  if(!S.user)return;
  const today=new Date().toISOString().slice(0,10);
  const s=DB.streak();
  if(s.lastDate===today)return; // already counted today
  const yesterday=new Date(Date.now()-864e5).toISOString().slice(0,10);
  s.count=s.lastDate===yesterday?s.count+1:1;
  s.lastDate=today;
  DB.setStreak(s);
  if(s.count>=2)toast(`🔥 ${s.count}-day study streak!`);
}

function fcFlipCard(deckId){
  S.fcFlipped=!S.fcFlipped;
  frame(pgFlashcardStudy(DB.fcDecks().find(d=>d.id===deckId)));

function fcJudge(deckId,cardId,know){
  const card=document.getElementById('fc-swipe-card');
  if(card){
    card.style.transition='transform .3s ease,opacity .3s ease';
    card.style.transform=know?'translateX(80px) rotate(8deg)':'translateX(-80px) rotate(-8deg)';
    card.style.opacity='0';
  }
  if(know){
    S.fcKnown=[...new Set([...S.fcKnown,cardId])];
    S.fcLearning=S.fcLearning.filter(id=>id!==cardId);
  } else {
    S.fcLearning=[...new Set([...S.fcLearning,cardId])];
    S.fcKnown=S.fcKnown.filter(id=>id!==cardId);
  }
  setTimeout(()=>{
    S.fcIdx++;S.fcFlipped=false;
    frame(pgFlashcardStudy(DB.fcDecks().find(d=>d.id===deckId)));
  },280);
}
function fcRetryLearning(deckId){
  const deck=DB.fcDecks().find(d=>d.id===deckId);
  if(!deck)return;
  // Reorder cards: only still-learning ones, reset state
  const learningIds=new Set(S.fcLearning);
  const retry={...deck,cards:deck.cards.filter(c=>learningIds.has(c.id))};
  S.fcKnown=[];S.fcLearning=[];S.fcIdx=0;S.fcFlipped=false;
  frame(pgFlashcardStudy(retry));
}
function attachFcSwipe(deckId){
  const el=document.getElementById('fc-swipe-card');
  if(!el)return;
  let startX=0,startY=0,isDragging=false,curX=0;
  const knLbl=el.querySelector('.fc-swipe-know');
  const lrLbl=el.querySelector('.fc-swipe-learn');
  function onStart(x,y){startX=x;startY=y;isDragging=true;el.style.transition='none';}
  function onMove(x,y){
    if(!isDragging)return;
    const dx=x-startX,dy=y-startY;
    if(Math.abs(dy)>Math.abs(dx)+10){isDragging=false;return;} // vertical scroll
    curX=dx;
    el.style.transform=`translateX(${dx}px) rotate(${dx*0.06}deg)`;
    const ratio=Math.min(Math.abs(dx)/90,1);
    if(dx>0){knLbl.style.opacity=ratio;lrLbl.style.opacity=0;}
    else{lrLbl.style.opacity=ratio;knLbl.style.opacity=0;}
  }
  function onEnd(){
    if(!isDragging)return;isDragging=false;
    knLbl.style.opacity=0;lrLbl.style.opacity=0;
    el.style.transition='transform .3s ease,opacity .3s ease';
    if(curX>70){fcJudge(deckId,el.dataset.cardId,true);}
    else if(curX<-70){fcJudge(deckId,el.dataset.cardId,false);}
    else{el.style.transform='';el.style.opacity='';}
    curX=0;
  }
  el.addEventListener('mousedown',e=>{if(e.button===0)onStart(e.clientX,e.clientY)});
  window.addEventListener('mousemove',e=>{if(isDragging)onMove(e.clientX,e.clientY)});
  window.addEventListener('mouseup',onEnd);
  el.addEventListener('touchstart',e=>{const t=e.touches[0];onStart(t.clientX,t.clientY)},{passive:true});
  el.addEventListener('touchmove',e=>{const t=e.touches[0];onMove(t.clientX,t.clientY)},{passive:true});
  el.addEventListener('touchend',onEnd);
}

// ── FLASHCARD DOCX IMPORT ────────────────────────────────────────────────────
// Format: one card per line using == separator
//   sat==Standardized Academic Test
//   photosynthesis==Process by which plants convert sunlight to energy
// Also supports: word--definition  |  word\tdefinition
function parseFcText(text){
  const cards=[];
  // Split by semicolons (primary separator between cards), then by === inside each chunk
  const chunks=text.split(';');
  for(const raw of chunks){
    const chunk=raw.trim();if(!chunk)continue;
    const sep=chunk.indexOf('===');
    if(sep>0){
      const word=chunk.slice(0,sep).trim();
      const def=chunk.slice(sep+3).trim();
      if(word&&def)cards.push({id:uid(),word,def});
    }
  }
  return cards;
}
function importFcDocx(deckId,input){
  const file=input.files[0];if(!file)return;
  input.value='';
  const r=new FileReader();
  r.onload=e=>{
    // Use convertToHtml so paragraph/list structure is preserved as separate elements,
    // then extract text per <p>/<li> — this avoids mammoth concatenating all lines into one blob
    mammoth.extractRawText({arrayBuffer:e.target.result}).then(res=>{
      const cards=parseFcText(res.value);
      if(!cards.length){
        toast('No cards found — use  word===def;word2===def2  format','err');return;
      }
      const decks=DB.fcDecks();const deck=decks.find(d=>d.id===deckId);if(!deck)return;
      deck.cards=[...deck.cards,...cards];
      DB.setFcDecks(decks);
      frame(pgFlashcardDeck(deckId));
      toast(`✓ ${cards.length} card${cards.length!==1?'s':''} imported!`);
    }).catch(()=>toast('Could not read file','err'));
  };
  r.readAsArrayBuffer(file);
}

// ── QUICK PRACTICE ───────────────────────────────────────────────────────────
function startQuickPractice(){
  if(!S.user){toast('Sign in to use Quick Practice','err');return;}
  const tests=DB.tests().filter(t=>t.creatorId===S.user.id&&t.id!=='quick_practice');
  if(!tests.length){toast('Upload a test first!','err');return;}
  const testMap={};tests.forEach(t=>testMap[t.id]=t);
  const sr=DB.sr();
  const now=Date.now();
  // First try due SR reviews
  const dueEntries=sr.filter(r=>r.nextReview<=now&&testMap[r.testId]);
  const qs=[];
  const seen=new Set();
  dueEntries.forEach(r=>{
    const t=testMap[r.testId];if(!t)return;
    const q=t.questions.find(q=>q.id===r.qId);
    if(q&&!seen.has(q.id)){seen.add(q.id);qs.push({...q,options:shuffle(q.options)});}
  });
  // If fewer than 5 due, add recent wrong answers
  if(qs.length<5){
    const allResults=DB.results().filter(r=>r.userId===S.user.id);
    // Find worst sessions
    const wrongByTest={};
    allResults.forEach(r=>{
      const t=testMap[r.testId];if(!t)return;
      if(!wrongByTest[r.testId])wrongByTest[r.testId]=[];
      wrongByTest[r.testId].push(r);
    });
    tests.forEach(t=>{
      const res=(wrongByTest[t.id]||[]).sort((a,b)=>b.date-a.date)[0];
      if(!res)return;
      const pct=res.score/res.total;
      if(pct<0.8){
        // Add some questions from this test
        t.questions.slice(0,5).forEach(q=>{
          if(!seen.has(q.id)&&qs.length<20){seen.add(q.id);qs.push({...q,options:shuffle(q.options)});}
        });
      }
    });
  }
  if(!qs.length){toast('🎉 You\'re on top of everything — no reviews due!');return;}
  const practiceQs=shuffle(qs).slice(0,20);
  const fake={id:'quick_practice',shareId:'PRACTICE',title:'Quick Practice',
    questions:practiceQs,sessionCount:practiceQs.length,timerSeconds:0,emoji:'⚡',creatorId:S.user.id};
  const ts=DB.tests();
  const ei=ts.findIndex(t=>t.id==='quick_practice');
  if(ei>=0)ts[ei]=fake;else ts.push(fake);
  DB.setTests(ts);
  S.quizTestId='';S.quizQs=[];S.allQs=[];
  go('/test/quick_practice');
  toast(`⚡ ${practiceQs.length} review questions ready!`);
}

// ── SHARE AS IMAGE (Canvas) ──────────────────────────────────────────────────
function shareResultAsImage(){
  const r=S.lastResult;
  if(!r){toast('No result to share','err');return;}
  const {pct,title,correct,total,emoji}=r;
  try{
    const canvas=document.createElement('canvas');
    canvas.width=800;canvas.height=440;
    const ctx=canvas.getContext('2d');
    // Dark background
    const grad=ctx.createLinearGradient(0,0,0,440);
    grad.addColorStop(0,'#09090F');grad.addColorStop(1,'#141820');
    ctx.fillStyle=grad;ctx.fillRect(0,0,800,440);
    // Top accent stripe
    const ac=pct>=70?'#22C55E':pct>=50?'#FBBF24':'#EF4444';
    ctx.fillStyle=ac;ctx.fillRect(0,0,800,5);
    // Subtle card glow
    ctx.fillStyle='rgba(124,92,255,0.06)';ctx.fillRect(40,40,720,360);
    // Emoji
    ctx.font='68px serif';ctx.textAlign='center';
    ctx.fillText(emoji||'🎯',400,120);
    // Score %
    ctx.font='bold 96px system-ui,-apple-system,sans-serif';
    ctx.fillStyle=ac;
    ctx.fillText(pct+'%',400,230);
    // Correct / total
    ctx.font='bold 26px system-ui,-apple-system,sans-serif';
    ctx.fillStyle='rgba(248,250,252,0.7)';
    ctx.fillText(`${correct} of ${total} correct`,400,270);
    // Title
    ctx.font='bold 30px system-ui,-apple-system,sans-serif';
    ctx.fillStyle='#F8FAFC';
    const shortTitle=title.length>36?title.slice(0,34)+'…':title;
    ctx.fillText(shortTitle,400,320);
    // Branding
    ctx.font='22px system-ui,-apple-system,sans-serif';
    ctx.fillStyle='#7C5CFF';
    ctx.fillText('TopQuiz',400,390);
    // Download / share
    canvas.toBlob(async blob=>{
      try{
        const file=new File([blob],'topquiz-score.png',{type:'image/png'});
        if(navigator.share&&navigator.canShare({files:[file]})){
          await navigator.share({files:[file],title:'My TopQuiz Score',text:`I scored ${pct}% on "${title}"!`});
        }else{
          const a=document.createElement('a');
          a.href=URL.createObjectURL(blob);
          a.download='topquiz-score.png';a.click();
          toast('Score card saved! 🖼️');
        }
      }catch(e){if(e.name!=='AbortError')toast('Download ready','ok');}
    },'image/png');
  }catch(e){toast('Could not create image — try copying text instead','err');}
}
